                        </label>
                        <input type="range" id="reverb-slider" min="0" max="1" step="0.05" value="0.4" class="w-24 md:w-32 h-2 bg-stone-700 rounded-lg appearance-none cursor-pointer accent-blue-500" />

    <!-- 核心 JavaScript 邏輯 -->
    <script>
        // --- 核心設定資料 ---
        const PENTATONIC_SCALE = [
            { label: '高Do', freq: 523.25 }, // C5
            { label: 'La', freq: 440.00 },   // A4
            { label: 'Sol', freq: 392.00 },  // G4
            { label: 'Mi', freq: 329.63 },   // E4
            { label: 'Re', freq: 293.66 },   // D4
            { label: 'Do', freq: 261.63 }    // C4
        ];

        const STEPS = 16;
        const DEFAULT_GRID = [
            [true, null, null, null, true, null, null, null, true, null, null, null, true, null, null, null], // bigGong
            [null, null, true, null, null, null, true, null, null, null, true, null, null, null, true, null], // smallGong
            [null, true, null, true, null, true, null, true, null, true, null, true, null, true, null, true], // dingDang
            [null, null, null, null, true, null, null, null, null, null, null, null, true, null, null, null], // bo
            [true, null, null, true, null, true, null, null, true, null, null, true, null, true, null, null], // tanggu
            [null, true, null, null, true, null, true, null, null, true, null, null, true, null, true, null], // bangziLow
            [true, null, true, null, null, true, null, true, true, null, true, null, null, true, null, true], // bangziHigh
            [2, null, 3, null, 2, null, 1, null, 0, null, 1, null, 2, null, 3, null], // recorder
            [2, 'tie', 'tie', 'tie', 2, 'tie', 'tie', 'tie', 0, 'tie', 'tie', 'tie', 2, 'tie', 'tie', 'tie'], // panghu
            [null, 2, null, 2, null, 1, null, 1, null, 0, null, 0, null, 2, null, 2], // yehu
            [2, null, null, null, null, null, null, null, 3, null, null, null, null, null, null, null], // suonaLow
            [2, null, 3, 4, 2, null, 1, 2, 0, null, 1, 2, 2, null, 3, 4], // suonaHigh
        ];

        // --- 狀態變數 ---
        let isPlaying = false;
        let bpm = 105;
        let currentStep = 0;
        let selectedTool = 2; // Default 2 (Sol)
        let grid = JSON.parse(JSON.stringify(DEFAULT_GRID));
        let reverbLevel = 0.4;
        let humanize = true;
        let uploadedFiles = {};
        let isProcessing = false;
        let timerId = null;

        // --- Web Audio API 引擎 ---
        const AudioEngine = {
            ctx: null,
            customBuffers: {}, 
            customBaseFreqs: {}, 
            customSlices: {}, 
            masterGain: null,
            reverbNode: null,
            dryGain: null,
            wetGain: null,
            panners: {},

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.ctx.createGain();
                    this.dryGain = this.ctx.createGain();
                    this.wetGain = this.ctx.createGain();
                    
                    this.reverbNode = this.ctx.createConvolver();
                    this.reverbNode.buffer = this.createReverbBuffer(this.ctx, 2.5, 3.0); 

                    this.masterGain.connect(this.dryGain);
                    this.masterGain.connect(this.reverbNode);
                    this.reverbNode.connect(this.wetGain);
                    
                    this.dryGain.connect(this.ctx.destination);
                    this.wetGain.connect(this.ctx.destination);

                    this.wetGain.gain.value = 0.3; 
                    this.dryGain.gain.value = 0.8; 
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },

            setReverbLevel(level) {
                if (this.wetGain) this.wetGain.gain.value = level;
            },

            createReverbBuffer(ctx, length = 2, decay = 2) {
                const sampleRate = ctx.sampleRate;
                const lengthFrames = sampleRate * length;
                const impulse = ctx.createBuffer(2, lengthFrames, sampleRate);
                for (let i = 0; i < 2; i++) {
                    const channel = impulse.getChannelData(i);
                    for (let j = 0; j < lengthFrames; j++) {
                        channel[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / lengthFrames, decay);
                    }
                }
                return impulse;
            },

            getPanner(trackId, panValue) {
                if (!this.panners[trackId]) {
                    const panner = this.ctx.createStereoPanner();
                    panner.pan.value = panValue;
                    panner.connect(this.masterGain);
                    this.panners[trackId] = panner;
                }
                return this.panners[trackId];
            },

            autoCorrelate(buffer, sampleRate) {
                const SIZE = Math.min(buffer.length, 8192); 
                let rms = 0;
                for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];
                rms = Math.sqrt(rms / SIZE);
                if (rms < 0.01) return -1; 

                let r1 = 0, r2 = SIZE - 1, thres = 0.2;
                for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buffer[i]) < thres) { r1 = i; break; }
                for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buffer[SIZE - i]) < thres) { r2 = SIZE - i; break; }
                
                const buf = buffer.slice(r1, r2);
                const newSize = buf.length;

                let c = new Array(newSize).fill(0);
                for (let i = 0; i < newSize; i++) {
                    for (let j = 0; j < newSize - i; j++) c[i] += buf[j] * buf[j + i];
                }
                let d = 0;
                while (c[d] > c[d + 1]) d++;
                let maxval = -1, maxpos = -1;
                for (let i = d; i < newSize; i++) {
                    if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
                }
                let T0 = maxpos;
                return sampleRate / T0;
            },

            async loadSmartSample(trackId, arrayBuffer, isMelodic) {
                this.init();
                const bufferCopy = arrayBuffer.slice(0);
                const audioBuffer = await this.ctx.decodeAudioData(bufferCopy);
                
                if (!this.customSlices[trackId]) this.customSlices[trackId] = {};
                let notesExtracted = [];

                const data = audioBuffer.getChannelData(0);
                const sampleRate = audioBuffer.sampleRate;

                let maxAmplitude = 0;
                for (let i = 0; i < data.length; i++) {
                    const absVal = Math.abs(data[i]);
                    if (absVal > maxAmplitude) maxAmplitude = absVal;
                }

                if (!isMelodic) {
                    let peakIndex = 0;
                    for (let i = 0; i < data.length; i++) {
                        if (Math.abs(data[i]) >= maxAmplitude * 0.99) { peakIndex = i; break; }
                    }
                    let startIdx = peakIndex;
                    while (startIdx > 0 && Math.abs(data[startIdx]) > maxAmplitude * 0.05) startIdx--;
                    startIdx = Math.max(0, startIdx - Math.floor(sampleRate * 0.02));

                    const cleanBuffer = this.ctx.createBuffer(audioBuffer.numberOfChannels, data.length - startIdx, sampleRate);
                    for (let c = 0; c < audioBuffer.numberOfChannels; c++) {
                        cleanBuffer.copyToChannel(audioBuffer.getChannelData(c).slice(startIdx), c);
                    }
                    this.customBuffers[trackId] = cleanBuffer;
                    return { extracted: ['原音入庫'] };
                }

                const windowSize = Math.floor(sampleRate * 0.05); 
                let isPlaying = false;
                let segments = [];
                let currentStart = 0;
                const threshold = maxAmplitude * 0.15; 

                for (let i = 0; i < data.length; i += windowSize) {
                    let sum = 0;
                    for (let j = 0; j < windowSize && i + j < data.length; j++) sum += data[i + j] * data[i + j];
                    let rms = Math.sqrt(sum / windowSize);

                    if (rms > threshold && !isPlaying) {
                        isPlaying = true;
                        currentStart = i;
                    } else if (rms < threshold / 2 && isPlaying) {
                        isPlaying = false;
                        if (i - currentStart > sampleRate * 0.15) segments.push({ start: currentStart, end: i });
                    }
                }
                if (isPlaying && data.length - currentStart > sampleRate * 0.15) {
                    segments.push({ start: currentStart, end: data.length });
                }
                if (segments.length === 0) segments = [{ start: 0, end: data.length }];

                segments.forEach(seg => {
                    const sliceData = data.slice(seg.start, seg.end);
                    const freq = this.autoCorrelate(sliceData, sampleRate);
                    
                    if (freq > 50 && freq < 3000) {
                        let closestIdx = -1;
                        let minDiff = Infinity;
                        PENTATONIC_SCALE.forEach((note, idx) => {
                            const diff = Math.abs(Math.log2(freq / note.freq));
                            if (diff < minDiff) { minDiff = diff; closestIdx = idx; }
                        });
                        if (minDiff < 5/12) {
                            const length = seg.end - seg.start;
                            const newBuffer = this.ctx.createBuffer(audioBuffer.numberOfChannels, length, sampleRate);
                            for (let c = 0; c < audioBuffer.numberOfChannels; c++) {
                                newBuffer.copyToChannel(audioBuffer.getChannelData(c).slice(seg.start, seg.end), c);
                            }
                            this.customSlices[trackId][closestIdx] = newBuffer;
                            const label = PENTATONIC_SCALE[closestIdx].label;
                            if (!notesExtracted.includes(label)) notesExtracted.push(label);
                        }
                    }
                });

                const firstSegmentLength = segments[0].end - segments[0].start;
                const cleanFallbackBuffer = this.ctx.createBuffer(audioBuffer.numberOfChannels, firstSegmentLength, sampleRate);
                for (let c = 0; c < audioBuffer.numberOfChannels; c++) {
                    cleanFallbackBuffer.copyToChannel(audioBuffer.getChannelData(c).slice(segments[0].start, segments[0].end), c);
                }
                this.customBuffers[trackId] = cleanFallbackBuffer;
                this.customBaseFreqs[trackId] = this.autoCorrelate(data.slice(segments[0].start, segments[0].end), sampleRate) || 261.63;

                return { extracted: notesExtracted.length > 0 ? notesExtracted : ['單音 (已變速)'] };
            },

            playRealSample(trackId, targetFreq, isMelodic, duration = 1.0, pan = 0, velocity = 1.0, startTimeOffset = 0) {
                if (!this.ctx) return;
                let bufferToPlay = null;
                let playbackRate = 1;

                if (isMelodic && targetFreq) {
                    const noteIndex = PENTATONIC_SCALE.findIndex(n => n.freq === targetFreq);
                    if (this.customSlices[trackId] && this.customSlices[trackId][noteIndex]) {
                        bufferToPlay = this.customSlices[trackId][noteIndex];
                        playbackRate = 1; 
                    } else if (this.customBuffers[trackId]) {
                        bufferToPlay = this.customBuffers[trackId];
                        const baseFreq = this.customBaseFreqs[trackId] || 261.63;
                        playbackRate = targetFreq / baseFreq;
                    }
                } else {
                    bufferToPlay = this.customBuffers[trackId];
                }

                if (!bufferToPlay) return;

                const source = this.ctx.createBufferSource();
                const gainNode = this.ctx.createGain();
                const pannerNode = this.getPanner(trackId, pan);

                source.buffer = bufferToPlay;
                source.playbackRate.value = playbackRate;

                const attack = isMelodic ? 0.08 : 0.01;
                const release = isMelodic ? 0.35 : 0.15; 
                const actualStartTime = this.ctx.currentTime + startTimeOffset;

                gainNode.gain.setValueAtTime(0, actualStartTime);
                gainNode.gain.linearRampToValueAtTime(velocity, actualStartTime + attack);
                gainNode.gain.setValueAtTime(velocity, actualStartTime + Math.max(attack, duration - release));
                gainNode.gain.linearRampToValueAtTime(0.001, actualStartTime + duration + release);

                source.connect(gainNode);
                gainNode.connect(pannerNode);

                source.start(actualStartTime);
                source.stop(actualStartTime + duration + release + 0.1);
            },

            playSynth(type, freq, duration, pan, velocity, startTimeOffset) {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gainNode = this.ctx.createGain();
                const pannerNode = this.getPanner('synth', pan);
                osc.type = type; osc.frequency.setValueAtTime(freq || 200, this.ctx.currentTime + startTimeOffset);
                const actualStartTime = this.ctx.currentTime + startTimeOffset;
                gainNode.gain.setValueAtTime(0, actualStartTime);
                gainNode.gain.linearRampToValueAtTime(velocity * 0.5, actualStartTime + 0.05);
                gainNode.gain.exponentialRampToValueAtTime(0.001, actualStartTime + duration);
                osc.connect(gainNode); gainNode.connect(pannerNode);
                osc.start(actualStartTime); osc.stop(actualStartTime + duration);
            }
        };

        const TRACKS = [
            { id: 'bigGong', name: '大鑼', isMelodic: false, pan: 0.0, color: 'bg-amber-700', hoverColor: 'hover:bg-amber-600' },
            { id: 'smallGong', name: '小鑼', isMelodic: false, pan: 0.3, color: 'bg-amber-500', hoverColor: 'hover:bg-amber-400' },
            { id: 'dingDang', name: '叮噹', isMelodic: false, pan: -0.4, color: 'bg-yellow-500', hoverColor: 'hover:bg-yellow-400' },
            { id: 'bo', name: '鈸', isMelodic: false, pan: 0.5, color: 'bg-orange-500', hoverColor: 'hover:bg-orange-400' },
            { id: 'tanggu', name: '堂鼓', isMelodic: false, pan: -0.2, color: 'bg-red-700', hoverColor: 'hover:bg-red-600' },
            { id: 'bangziLow', name: '梆子(低)', isMelodic: false, pan: -0.6, color: 'bg-stone-700', hoverColor: 'hover:bg-stone-600' },
            { id: 'bangziHigh', name: '梆子(高)', isMelodic: false, pan: -0.5, color: 'bg-stone-500', hoverColor: 'hover:bg-stone-400' },
            { id: 'recorder', name: '直笛', isMelodic: true, pan: 0.6, color: 'bg-emerald-600', hoverColor: 'hover:bg-emerald-500' },
            { id: 'panghu', name: '胖胡', isMelodic: true, pan: -0.5, color: 'bg-rose-600', hoverColor: 'hover:bg-rose-500' },
            { id: 'yehu', name: '椰胡', isMelodic: true, pan: 0.4, color: 'bg-cyan-600', hoverColor: 'hover:bg-cyan-500' },
            { id: 'suonaLow', name: '嗩吶(低)', isMelodic: true, pan: -0.3, color: 'bg-orange-600', hoverColor: 'hover:bg-orange-500' },
            { id: 'suonaHigh', name: '嗩吶(高)', isMelodic: true, pan: 0.2, color: 'bg-yellow-600', hoverColor: 'hover:bg-yellow-500' }
        ];

        function playTrack(track, freq, dur, velocity = 1.0, timeOffset = 0) {
            if (AudioEngine.customBuffers[track.id] || (AudioEngine.customSlices[track.id] && Object.keys(AudioEngine.customSlices[track.id]).length > 0)) {
                AudioEngine.playRealSample(track.id, freq, track.isMelodic, dur, track.pan, velocity, timeOffset);
            } else {
                AudioEngine.playSynth('sine', freq, dur, track.pan, velocity, timeOffset);
            }
        }

        // --- DOM 更新與渲染 ---

        function renderTools() {
            const container = document.getElementById('tool-container');
            container.innerHTML = '';
            
            PENTATONIC_SCALE.forEach((pitch, index) => {
                const btn = document.createElement('button');
                btn.innerText = pitch.label;
                btn.className = `px-3 py-1.5 rounded-lg text-sm font-bold transition-all ${selectedTool === index ? 'bg-blue-600 text-white shadow-md transform scale-105' : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-100'}`;
                btn.onclick = () => {
                    selectedTool = index;
                    renderTools(); // re-render tools to update active state
                };
                container.appendChild(btn);
            });

            const divider = document.createElement('div');
            divider.className = 'w-px h-6 bg-stone-300 mx-1';
            container.appendChild(divider);

            const tieBtn = document.createElement('button');
            tieBtn.innerText = '延音 (—)';
            tieBtn.className = `px-3 py-1.5 rounded-lg text-sm font-bold transition-all ${selectedTool === 'tie' ? 'bg-indigo-600 text-white shadow-md transform scale-105' : 'bg-indigo-50 text-indigo-700 border border-indigo-200 hover:bg-indigo-100'}`;
            tieBtn.onclick = () => {
                selectedTool = 'tie';
                renderTools();
            };
            container.appendChild(tieBtn);
        }

        function renderPreviewButtons() {
            const container = document.getElementById('preview-container');
            container.innerHTML = '';

            TRACKS.forEach(track => {
                const hasCustomSample = !!uploadedFiles[track.id];
                const btn = document.createElement('button');
                
                const baseClasses = "text-white py-3 rounded-xl shadow-md transition-all active:scale-95 flex flex-col items-center justify-center gap-1 relative overflow-hidden";
                const colorClasses = hasCustomSample ? 'bg-emerald-600 hover:bg-emerald-500 ring-2 ring-emerald-300 ring-offset-2 shadow-emerald-200/50' : `${track.color} ${track.hoverColor}`;
                
                btn.className = `${baseClasses} ${colorClasses}`;
                
                let innerHTML = `<span class="text-sm font-bold z-10">${track.name}</span>`;
                if (hasCustomSample) {
                    innerHTML += `<i class="fa-solid fa-circle-check text-emerald-200 z-10 text-sm"></i>`;
                }
                btn.innerHTML = innerHTML;

                btn.onclick = () => {
                    AudioEngine.init();
                    if(track.isMelodic) {
                        const pitchIndex = selectedTool === 'tie' ? 2 : selectedTool; 
                        playTrack(track, PENTATONIC_SCALE[pitchIndex].freq, 1.0, 1.0, 0);
                    } else {
                        playTrack(track, null, 1.0, 1.0, 0);
                    }
                };

                container.appendChild(btn);
            });
        }

        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';

            TRACKS.forEach((track, trackIndex) => {
                const hasCustomSample = !!uploadedFiles[track.id];
                const trackBaseColor = hasCustomSample ? 'bg-emerald-500' : track.color;

                const trackRow = document.createElement('div');
                trackRow.className = "flex items-center gap-2 group";

                // Label
                const labelDiv = document.createElement('div');
                labelDiv.className = `w-24 text-center font-bold text-white text-xs px-2 py-2 rounded shadow-sm flex flex-col items-center justify-center ${trackBaseColor}`;
                labelDiv.innerHTML = `<span>${track.name}</span>`;
                trackRow.appendChild(labelDiv);

                // Grid Cells
                const cellsContainer = document.createElement('div');
                cellsContainer.className = "flex-1 flex gap-1 bg-stone-100 p-1.5 rounded-lg border border-stone-200 group-hover:bg-stone-200/50 transition-colors relative";
                
                grid[trackIndex].forEach((cellValue, stepIndex) => {
                    const btn = document.createElement('button');
                    const isActive = cellValue !== null;
                    const isTie = cellValue === 'tie';
                    
                    let activeClasses = isTie 
                        ? `${trackBaseColor} opacity-70 shadow-inner scale-[0.98] border-transparent text-white rounded-l-none border-l-0` 
                        : `${trackBaseColor} shadow-inner scale-[0.97] border-transparent text-white`;

                    let baseClasses = `grid-cell flex-1 h-10 rounded transition-all duration-150 border flex items-center justify-center ${stepIndex % 4 === 0 && !isActive ? 'border-stone-400' : 'border-stone-200'}`;
                    
                    if (isActive) {
                        baseClasses += ` ${activeClasses}`;
                    } else {
                        baseClasses += ` bg-white hover:bg-stone-50`;
                    }
                    
                    if (currentStep === stepIndex && isPlaying) {
                        baseClasses += ` active-step`;
                    }

                    btn.className = baseClasses;
                    btn.id = `cell-${trackIndex}-${stepIndex}`;

                    if (isActive && track.isMelodic && !isTie) {
                        btn.innerHTML = `<span class="text-[10px] font-bold drop-shadow-md">${PENTATONIC_SCALE[cellValue].label}</span>`;
                    } else if (isActive && track.isMelodic && isTie) {
                        btn.innerHTML = `<span class="text-[10px] font-bold opacity-75">—</span>`;
                    }

                    btn.onclick = () => {
                        AudioEngine.init();
                        toggleCell(trackIndex, stepIndex);
                    };

                    cellsContainer.appendChild(btn);
                });

                trackRow.appendChild(cellsContainer);
                container.appendChild(trackRow);
            });
        }

        // 優化：只更新需要改變外觀的元素，不重繪整個 Grid 以避免閃爍
        function updateGridHighlight() {
            for (let t = 0; t < TRACKS.length; t++) {
                for (let s = 0; s < STEPS; s++) {
                    const btn = document.getElementById(`cell-${t}-${s}`);
                    if (btn) {
                        if (s === currentStep && isPlaying) {
                            btn.classList.add('active-step');
                        } else {
                            btn.classList.remove('active-step');
                        }
                    }
                }
            }
        }

        // --- 邏輯操作 ---

        function toggleCell(trackIndex, stepIndex) {
            const track = TRACKS[trackIndex];
            const currentVal = grid[trackIndex][stepIndex];

            if (track.isMelodic) {
                if (currentVal === selectedTool) {
                    grid[trackIndex][stepIndex] = null; 
                } else {
                    grid[trackIndex][stepIndex] = selectedTool;
                    if (selectedTool !== 'tie') {
                        playTrack(track, PENTATONIC_SCALE[selectedTool].freq, 0.5, 1.0, 0); 
                    }
                }
            } else {
                if (currentVal) {
                    grid[trackIndex][stepIndex] = null;
                } else {
                    grid[trackIndex][stepIndex] = true;
                    playTrack(track, null, 0.5, 1.0, 0); 
                }
            }
            // 完全重繪那一個 Row 的按鈕即可，簡單起見全繪
            renderGrid();
        }

        function playStep(step) {
            const stepDurationSec = (60000 / bpm / 4) / 1000;

            TRACKS.forEach((track, trackIndex) => {
                const cellValue = grid[trackIndex][step];
                
                if (cellValue !== null && cellValue !== 'tie') {
                    let tieCount = 0;
                    for (let i = 1; i < STEPS; i++) {
                        if (grid[trackIndex][(step + i) % STEPS] === 'tie') { tieCount++; } else { break; }
                    }
                    const totalDuration = stepDurationSec * (1 + tieCount);

                    const humanizeOffset = humanize ? (Math.random() * 0.03 - 0.015) : 0;
                    const velocity = humanize ? (0.8 + Math.random() * 0.2) : 1.0;

                    if (track.isMelodic) {
                        playTrack(track, PENTATONIC_SCALE[cellValue].freq, totalDuration, velocity, humanizeOffset);
                    } else {
                        playTrack(track, null, totalDuration, velocity, humanizeOffset); 
                    }
                }
            });
        }

        function togglePlay() {
            AudioEngine.init();
            const btnPlay = document.getElementById('btn-play');
            const iconPlay = document.getElementById('icon-play');
            const textPlay = document.getElementById('text-play');

            if (isPlaying) {
                isPlaying = false;
                clearInterval(timerId);
                currentStep = 0;
                
                // UI Reset
                btnPlay.classList.remove('bg-red-500', 'hover:bg-red-600');
                btnPlay.classList.add('bg-emerald-500', 'hover:bg-emerald-400');
                iconPlay.classList.remove('fa-stop');
                iconPlay.classList.add('fa-play');
                textPlay.innerText = '播放合奏';
                
                updateGridHighlight();
            } else {
                isPlaying = true;
                const stepDuration = (60000 / bpm) / 4;
                
                // UI Update
                btnPlay.classList.remove('bg-emerald-500', 'hover:bg-emerald-400');
                btnPlay.classList.add('bg-red-500', 'hover:bg-red-600');
                iconPlay.classList.remove('fa-play');
                iconPlay.classList.add('fa-stop');
                textPlay.innerText = '停止合奏';

                timerId = setInterval(() => {
                    playStep(currentStep);
                    updateGridHighlight();
                    currentStep = (currentStep + 1) % STEPS;
                }, stepDuration);
            }
        }

        function clearGrid() {
            grid = Array.from({ length: TRACKS.length }, () => Array(STEPS).fill(null));
            if (isPlaying) togglePlay();
            currentStep = 0;
            renderGrid();
        }

        function loadExample() {
            grid = JSON.parse(JSON.stringify(DEFAULT_GRID));
            if (isPlaying) togglePlay();
            currentStep = 0;
            renderGrid();
        }

        // --- 雲端音檔下載邏輯 ---

        function showError(msg) {
            const container = document.getElementById('error-container');
            const toast = document.createElement('div');
            toast.className = "bg-red-600 text-white px-4 py-2 rounded shadow-lg text-sm font-bold flex items-center gap-2 opacity-0 transition-opacity duration-300";
            toast.innerHTML = `<i class="fa-solid fa-circle-info"></i> ${msg}`;
            container.appendChild(toast);
            
            // Fade in
            setTimeout(() => toast.classList.remove('opacity-0'), 10);
            
            // Fade out and remove
            setTimeout(() => {
                toast.classList.add('opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        const fetchCloudAudio = async (trackId, trackName) => {
            const baseUrl = 'https://kiddyhakka.github.io/M11475002/eight';
            const extensions = ['.mp3', '.wav', '.m4a'];
            
            const namesToTry = [trackName, trackId];

            for (const name of namesToTry) {
                for (const ext of extensions) {
                    try {
                        const url = `${baseUrl}/${encodeURIComponent(name)}${ext}`;
                        const res = await fetch(url);
                        if (res.ok) {
                            const buffer = await res.arrayBuffer();
                            return { buffer, fileName: `${name}${ext}` };
                        }
                    } catch (err) {
                        // Ignore and try next
                    }
                }
            }
            throw new Error(`雲端找不到 ${trackName} 的音檔`);
        };

        const handleCloudLoadAll = async () => {
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden');
            
            // Small delay to allow UI to render overlay before heavy processing
            await new Promise(r => setTimeout(r, 100));

            for (const track of TRACKS) {
                if (uploadedFiles[track.id]) continue; 
                try {
                    const { buffer, fileName } = await fetchCloudAudio(track.id, track.name);
                    const result = await AudioEngine.loadSmartSample(track.id, buffer, track.isMelodic);
                    uploadedFiles[track.id] = { name: fileName, notes: result.extracted };
                    
                    // Update UI iteratively to show progress
                    renderPreviewButtons();
                    renderGrid();
                } catch (err) {
                    console.warn(err);
                }
            }
            overlay.classList.add('hidden');
        };

        // --- 初始化與事件綁定 ---

        window.onload = () => {
            // Initial Renders
            renderTools();
            renderPreviewButtons();
            renderGrid();

            // Bind Control Events
            document.getElementById('btn-play').onclick = togglePlay;
            document.getElementById('btn-load-example').onclick = loadExample;
            document.getElementById('btn-clear').onclick = clearGrid;

            // Global Interaction to unlock audio
            document.body.addEventListener('click', () => AudioEngine.init(), { once: true });

            // Humanize Toggle
            const humanizeToggle = document.getElementById('humanize-toggle');
            const humanizeBg = document.getElementById('humanize-bg');
            const humanizeKnob = document.getElementById('humanize-knob');
            const humanizeIcon = document.getElementById('humanize-icon');
            
            humanizeToggle.onchange = (e) => {
                humanize = e.target.checked;
                if (humanize) {
                    humanizeBg.classList.replace('bg-stone-600', 'bg-emerald-500');
                    humanizeKnob.classList.add('translate-x-4');
                    humanizeIcon.classList.add('text-emerald-400');
                } else {
                    humanizeBg.classList.replace('bg-emerald-500', 'bg-stone-600');
                    humanizeKnob.classList.remove('translate-x-4');
                    humanizeIcon.classList.remove('text-emerald-400');
                }
            };

            // BPM Slider
            const bpmSlider = document.getElementById('bpm-slider');
            const bpmDisplay = document.getElementById('bpm-display');
            bpmSlider.oninput = (e) => {
                bpm = Number(e.target.value);
                bpmDisplay.innerText = bpm;
                // Update interval if playing
                if (isPlaying) {
                    clearInterval(timerId);
                    timerId = setInterval(() => {
                        playStep(currentStep);
                        updateGridHighlight();
                        currentStep = (currentStep + 1) % STEPS;
                    }, (60000 / bpm) / 4);
                }
            };

            // Reverb Slider
            const reverbSlider = document.getElementById('reverb-slider');
            const reverbIcon = document.getElementById('reverb-icon');
            reverbSlider.oninput = (e) => {
                reverbLevel = Number(e.target.value);
                AudioEngine.setReverbLevel(reverbLevel);
                if (reverbLevel > 0) {
                    reverbIcon.classList.add('text-blue-400');
                } else {
                    reverbIcon.classList.remove('text-blue-400');
                }
            };

            // Auto load cloud audio on mount
            handleCloudLoadAll();
        };

    </script>
</body>
</html>
