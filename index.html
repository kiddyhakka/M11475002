<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鬧(Now)打八音 APP</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 自訂動畫與樣式 -->
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInBottom { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        .animate-in { animation-fill-mode: both; }
        .fade-in { animation-name: fadeIn; animation-duration: 300ms; }
        .zoom-in { animation-name: zoomIn; animation-duration: 300ms; }
        .slide-in-from-bottom-4 { animation-name: slideInBottom; animation-duration: 500ms; }
        .slide-in-from-right-4 { animation-name: slideInRight; animation-duration: 300ms; }

        /* 隱藏捲軸但保留滾動功能 (美化介面) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 滑桿客製化 */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: currentColor;
            cursor: pointer;
            margin-top: -4px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-stone-200 flex justify-center font-sans text-stone-800 selection:bg-amber-200 min-h-screen">

    <!-- 模擬手機 APP 外觀的容器 -->
    <div class="w-full max-w-md bg-stone-50 shadow-2xl relative flex flex-col h-[100dvh] overflow-hidden">
        
        <!-- Header - APP 風格 -->
        <header class="bg-amber-700 text-white p-4 flex items-center justify-between shrink-0 shadow-md z-20 relative">
            <div id="header-left-slot">
                <!-- 返回按鈕將透過 JS 動態產生 -->
            </div>
            <h1 class="text-lg md:text-xl font-bold tracking-wider absolute left-1/2 -translate-x-1/2 flex items-center gap-2 w-max">
                <i data-lucide="music" style="width: 20px; height: 20px;" class="hidden sm:block"></i> 鬧(Now)打八音
            </h1>
            <div class="w-16"></div> <!-- 佔位用 -->
        </header>

        <!-- 內容區域 -->
        <main id="app-root" class="flex-1 overflow-y-auto no-scrollbar bg-amber-50/30 flex flex-col relative">
            <!-- 畫面內容將由 JavaScript 動態渲染 -->
        </main>

        <!-- Footer 版權聲明 - APP 風格 -->
        <footer class="bg-stone-900 text-stone-400 text-[10px] p-3 text-center shrink-0 z-20">
            <p>本APP為課堂教學使用，無商業用途。</p>
            <p class="mt-0.5 opacity-80">部分內容取材自公開網路、紙本出版品或網站，版權屬原作者所有。</p>
        </footer>
    </div>

    <!-- 應用程式邏輯 -->
    <script>
        // ==========================================
        // 1. 靜態資料與音效引擎 (音樂拼圖)
        // ==========================================
        const PENTATONIC_SCALE = [
            { label: '高Do', freq: 523.25 }, // C5
            { label: 'La', freq: 440.00 },   // A4
            { label: 'Sol', freq: 392.00 },  // G4
            { label: 'Mi', freq: 329.63 },   // E4
            { label: 'Re', freq: 293.66 },   // D4
            { label: 'Do', freq: 261.63 }    // C4
        ];

        const AudioEngine = {
            ctx: null,
            customBuffers: {}, 
            customBaseFreqs: {}, 
            customSlices: {}, 
            masterGain: null,
            reverbNode: null,
            dryGain: null,
            wetGain: null,
            panners: {},

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.ctx.createGain();
                    this.dryGain = this.ctx.createGain();
                    this.wetGain = this.ctx.createGain();
                    this.reverbNode = this.ctx.createConvolver();
                    this.reverbNode.buffer = this.createReverbBuffer(this.ctx, 2.5, 3.0);
                    this.masterGain.connect(this.dryGain);
                    this.masterGain.connect(this.reverbNode);
                    this.reverbNode.connect(this.wetGain);
                    this.dryGain.connect(this.ctx.destination);
                    this.wetGain.connect(this.ctx.destination);
                    this.wetGain.gain.value = 0.4; // 預設殘響
                    this.dryGain.gain.value = 0.8;
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            setReverbLevel(level) {
                if (this.wetGain) this.wetGain.gain.value = level;
            },
            createReverbBuffer(ctx, length = 2, decay = 2) {
                const sampleRate = ctx.sampleRate;
                const lengthFrames = sampleRate * length;
                const impulse = ctx.createBuffer(2, lengthFrames, sampleRate);
                for (let i = 0; i < 2; i++) {
                    const channel = impulse.getChannelData(i);
                    for (let j = 0; j < lengthFrames; j++) {
                        channel[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / lengthFrames, decay);
                    }
                }
                return impulse;
            },
            getPanner(trackId, panValue) {
                if (!this.panners[trackId]) {
                    const panner = this.ctx.createStereoPanner();
                    panner.pan.value = panValue;
                    panner.connect(this.masterGain);
                    this.panners[trackId] = panner;
                }
                return this.panners[trackId];
            },
            autoCorrelate(buffer, sampleRate) {
                const SIZE = Math.min(buffer.length, 8192); 
                let rms = 0;
                for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];
                rms = Math.sqrt(rms / SIZE);
                if (rms < 0.01) return -1; 
                let r1 = 0, r2 = SIZE - 1, thres = 0.2;
                for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buffer[i]) < thres) { r1 = i; break; }
                for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buffer[SIZE - i]) < thres) { r2 = SIZE - i; break; }
                const buf = buffer.slice(r1, r2);
                const newSize = buf.length;
                let c = new Array(newSize).fill(0);
                for (let i = 0; i < newSize; i++) {
                    for (let j = 0; j < newSize - i; j++) c[i] += buf[j] * buf[j + i];
                }
                let d = 0;
                while (c[d] > c[d + 1]) d++;
                let maxval = -1, maxpos = -1;
                for (let i = d; i < newSize; i++) {
                    if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
                }
                let T0 = maxpos;
                return sampleRate / T0;
            },
            async loadSmartSample(trackId, file, isMelodic) {
                this.init();
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await this.ctx.decodeAudioData(arrayBuffer);
                if (!this.customSlices[trackId]) this.customSlices[trackId] = {};
                let notesExtracted = [];
                const data = audioBuffer.getChannelData(0);
                const sampleRate = audioBuffer.sampleRate;
                let maxAmplitude = 0;
                for (let i = 0; i < data.length; i++) {
                    const absVal = Math.abs(data[i]);
                    if (absVal > maxAmplitude) maxAmplitude = absVal;
                }
                if (!isMelodic) {
                    let peakIndex = 0;
                    for (let i = 0; i < data.length; i++) {
                        if (Math.abs(data[i]) >= maxAmplitude * 0.99) { peakIndex = i; break; }
                    }
                    let startIdx = peakIndex;
                    while (startIdx > 0 && Math.abs(data[startIdx]) > maxAmplitude * 0.05) startIdx--;
                    startIdx = Math.max(0, startIdx - Math.floor(sampleRate * 0.02));
                    const cleanBuffer = this.ctx.createBuffer(audioBuffer.numberOfChannels, data.length - startIdx, sampleRate);
                    for (let c = 0; c < audioBuffer.numberOfChannels; c++) {
                        cleanBuffer.copyToChannel(audioBuffer.getChannelData(c).slice(startIdx), c);
                    }
                    this.customBuffers[trackId] = cleanBuffer;
                    return { extracted: ['原音入庫'] };
                }
                const windowSize = Math.floor(sampleRate * 0.05); 
                let isPlaying = false;
                let segments = [];
                let currentStart = 0;
                const threshold = maxAmplitude * 0.15; 
                for (let i = 0; i < data.length; i += windowSize) {
                    let sum = 0;
                    for (let j = 0; j < windowSize && i + j < data.length; j++) sum += data[i + j] * data[i + j];
                    let rms = Math.sqrt(sum / windowSize);
                    if (rms > threshold && !isPlaying) {
                        isPlaying = true;
                        currentStart = i;
                    } else if (rms < threshold / 2 && isPlaying) {
                        isPlaying = false;
                        if (i - currentStart > sampleRate * 0.15) segments.push({ start: currentStart, end: i });
                    }
                }
                if (isPlaying && data.length - currentStart > sampleRate * 0.15) {
                    segments.push({ start: currentStart, end: data.length });
                }
                if (segments.length === 0) segments = [{ start: 0, end: data.length }];
                segments.forEach(seg => {
                    const sliceData = data.slice(seg.start, seg.end);
                    const freq = this.autoCorrelate(sliceData, sampleRate);
                    if (freq > 50 && freq < 3000) {
                        let closestIdx = -1;
                        let minDiff = Infinity;
                        PENTATONIC_SCALE.forEach((note, idx) => {
                            const diff = Math.abs(Math.log2(freq / note.freq));
                            if (diff < minDiff) { minDiff = diff; closestIdx = idx; }
                        });
                        if (minDiff < 5/12) {
                            const length = seg.end - seg.start;
                            const newBuffer = this.ctx.createBuffer(audioBuffer.numberOfChannels, length, sampleRate);
                            for (let c = 0; c < audioBuffer.numberOfChannels; c++) {
                                newBuffer.copyToChannel(audioBuffer.getChannelData(c).slice(seg.start, seg.end), c);
                            }
                            this.customSlices[trackId][closestIdx] = newBuffer;
                            const label = PENTATONIC_SCALE[closestIdx].label;
                            if (!notesExtracted.includes(label)) notesExtracted.push(label);
                        }
                    }
                });
                const firstSegmentLength = segments[0].end - segments[0].start;
                const cleanFallbackBuffer = this.ctx.createBuffer(audioBuffer.numberOfChannels, firstSegmentLength, sampleRate);
                for (let c = 0; c < audioBuffer.numberOfChannels; c++) {
                    cleanFallbackBuffer.copyToChannel(audioBuffer.getChannelData(c).slice(segments[0].start, segments[0].end), c);
                }
                this.customBuffers[trackId] = cleanFallbackBuffer;
                this.customBaseFreqs[trackId] = this.autoCorrelate(data.slice(segments[0].start, segments[0].end), sampleRate) || 261.63;
                return { extracted: notesExtracted.length > 0 ? notesExtracted : ['單音 (已變速)'] };
            },
            playRealSample(trackId, targetFreq, isMelodic, duration = 1.0, pan = 0, velocity = 1.0, startTimeOffset = 0) {
                if (!this.ctx) return;
                let bufferToPlay = null;
                let playbackRate = 1;
                if (isMelodic && targetFreq) {
                    const noteIndex = PENTATONIC_SCALE.findIndex(n => n.freq === targetFreq);
                    if (this.customSlices[trackId] && this.customSlices[trackId][noteIndex]) {
                        bufferToPlay = this.customSlices[trackId][noteIndex];
                        playbackRate = 1; 
                    } else if (this.customBuffers[trackId]) {
                        bufferToPlay = this.customBuffers[trackId];
                        const baseFreq = this.customBaseFreqs[trackId] || 261.63;
                        playbackRate = targetFreq / baseFreq;
                    }
                } else {
                    bufferToPlay = this.customBuffers[trackId];
                }
                if (!bufferToPlay) return;
                const source = this.ctx.createBufferSource();
                const gainNode = this.ctx.createGain();
                const pannerNode = this.getPanner(trackId, pan);
                source.buffer = bufferToPlay;
                source.playbackRate.value = playbackRate;
                const attack = isMelodic ? 0.08 : 0.01;
                const release = isMelodic ? 0.35 : 0.15;
                const actualStartTime = this.ctx.currentTime + startTimeOffset;
                gainNode.gain.setValueAtTime(0, actualStartTime);
                gainNode.gain.linearRampToValueAtTime(velocity, actualStartTime + attack);
                gainNode.gain.setValueAtTime(velocity, actualStartTime + Math.max(attack, duration - release));
                gainNode.gain.linearRampToValueAtTime(0.001, actualStartTime + duration + release);
                source.connect(gainNode);
                gainNode.connect(pannerNode);
                source.start(actualStartTime);
                source.stop(actualStartTime + duration + release + 0.1);
            },
            // 客家傳統吹打打擊樂器實體特性合成音色模擬 (Fallback Synthesizer)
            playSynth(trackId, freq, duration, pan, velocity, startTimeOffset) {
                if(!this.ctx) return;
                const now = this.ctx.currentTime + startTimeOffset;
                const pannerNode = this.getPanner(trackId, pan);

                if (trackId === 'bigGong') {
                    // 大鑼：向下低頻滑動的金屬敲擊音
                    const osc = this.ctx.createOscillator();
                    const gainNode = this.ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(125, now);
                    osc.frequency.exponentialRampToValueAtTime(55, now + duration * 0.7);
                    
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(450, now);
                    
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(velocity * 0.45, now + 0.015);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    
                    osc.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(pannerNode);
                    osc.start(now);
                    osc.stop(now + duration + 0.15);
                } else if (trackId === 'smallGong') {
                    // 小鑼：清脆快速上滑的高音銅鑼
                    const osc = this.ctx.createOscillator();
                    const gainNode = this.ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(620, now + 0.08);
                    
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(velocity * 0.4, now + 0.008);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    
                    osc.connect(gainNode);
                    gainNode.connect(pannerNode);
                    osc.start(now);
                    osc.stop(now + duration + 0.1);
                } else if (trackId === 'bo') {
                    // 鈸：金屬高頻沙沙噪音
                    const bufferSize = this.ctx.sampleRate * 0.25;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }
                    const noise = this.ctx.createBufferSource();
                    noise.buffer = buffer;
                    
                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'highpass';
                    filter.frequency.setValueAtTime(1800, now);
                    
                    const gainNode = this.ctx.createGain();
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(velocity * 0.25, now + 0.006);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    
                    noise.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(pannerNode);
                    noise.start(now);
                    noise.stop(now + duration + 0.1);
                } else if (trackId === 'dingDang') {
                    // 叮噹：清脆極高頻金屬小碰鈴
                    const osc = this.ctx.createOscillator();
                    const gainNode = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(1320, now);
                    
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(velocity * 0.3, now + 0.002);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    
                    osc.connect(gainNode);
                    gainNode.connect(pannerNode);
                    osc.start(now);
                    osc.stop(now + duration + 0.1);
                } else if (trackId === 'tanggu') {
                    // 堂鼓：沉穩低沉鼓音
                    const osc = this.ctx.createOscillator();
                    const gainNode = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.14);
                    
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(velocity * 0.85, now + 0.005);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    
                    osc.connect(gainNode);
                    gainNode.connect(pannerNode);
                    osc.start(now);
                    osc.stop(now + duration + 0.1);
                } else if (trackId === 'bangziLow' || trackId === 'bangziHigh') {
                    // 梆子：實木敲擊感
                    const osc = this.ctx.createOscillator();
                    const gainNode = this.ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(trackId === 'bangziHigh' ? 1100 : 700, now);
                    
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(velocity * 0.6, now + 0.002);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
                    
                    osc.connect(gainNode);
                    gainNode.connect(pannerNode);
                    osc.start(now);
                    osc.stop(now + 0.12);
                } else {
                    // 旋律吹管與弦樂類：高透度嗩吶、直笛、椰胡模擬（加入顫音 LFO）
                    const osc = this.ctx.createOscillator();
                    const gainNode = this.ctx.createGain();
                    
                    const lfo = this.ctx.createOscillator();
                    const lfoGain = this.ctx.createGain();
                    lfo.frequency.setValueAtTime(6.2, now); // 傳統顫音頻率
                    lfoGain.gain.setValueAtTime((freq || 220) * 0.015, now);
                    
                    lfo.connect(lfoGain);
                    lfoGain.connect(osc.frequency);
                    
                    if (trackId.includes('suona')) {
                        osc.type = 'sawtooth'; // 嗩吶明亮粗獷雙簧聲
                        const filter = this.ctx.createBiquadFilter();
                        filter.type = 'bandpass';
                        filter.frequency.setValueAtTime(1300, now);
                        filter.Q.setValueAtTime(1.0, now);
                        osc.connect(filter);
                        filter.connect(gainNode);
                    } else if (trackId.includes('recorder')) {
                        osc.type = 'triangle'; // 直笛平滑風鳴聲
                        osc.connect(gainNode);
                    } else { // 椰胡/胖胡傳統弦鳴
                        osc.type = 'sawtooth';
                        const filter = this.ctx.createBiquadFilter();
                        filter.type = 'lowpass';
                        filter.frequency.setValueAtTime(750, now);
                        osc.connect(filter);
                        filter.connect(gainNode);
                    }
                    
                    osc.frequency.setValueAtTime(freq || 220, now);
                    
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(velocity * 0.22, now + 0.04);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
                    
                    gainNode.connect(pannerNode);
                    
                    lfo.start(now);
                    osc.start(now);
                    lfo.stop(now + duration + 0.15);
                    osc.stop(now + duration + 0.15);
                }
            }
        };

        const playTrack = (track, freq, dur, velocity = 1.0, timeOffset = 0) => {
            if (AudioEngine.customBuffers[track.id] || (AudioEngine.customSlices[track.id] && Object.keys(AudioEngine.customSlices[track.id]).length > 0)) {
                AudioEngine.playRealSample(track.id, freq, track.isMelodic, dur, track.pan, velocity, timeOffset);
            } else {
                AudioEngine.playSynth(track.id, freq, dur, track.pan, velocity, timeOffset); 
            }
        };

        const TRACKS = [
            { id: 'bigGong', name: '大鑼', isMelodic: false, pan: 0.0, color: 'bg-amber-700', activeColor: 'bg-amber-600', play: function(f,d,v,t){playTrack(this, f, d, v, t)} },
            { id: 'smallGong', name: '小鑼', isMelodic: false, pan: 0.3, color: 'bg-amber-500', activeColor: 'bg-amber-400', play: function(f,d,v,t){playTrack(this, f, d, v, t)} },
            { id: 'dingDang', name: '叮噹', isMelodic: false, pan: -0.4, color: 'bg-yellow-500', activeColor: 'bg-yellow-400', play: function(f,d,v,t){playTrack(this, f, d, v, t)} },
            { id: 'bo', name: '鈸', isMelodic: false, pan: 0.5, color: 'bg-orange-500', activeColor: 'bg-orange-400', play: function(f,d,v,t){playTrack(this, f, d, v, t)} },
            { id: 'tanggu', name: '堂鼓', isMelodic: false, pan: -0.2, color: 'bg-red-700', activeColor: 'bg-red-600', play: function(f,d,v,t){playTrack(this, f, d, v, t)} },
            { id: 'bangziLow', name: '梆子(低)', isMelodic: false, pan: -0.6, color: 'bg-stone-700', activeColor: 'bg-stone-600', play: function(f,d,v,t){playTrack(this, f, d, v, t)} },
            { id: 'bangziHigh', name: '梆子(高)', isMelodic: false, pan: -0.5, color: 'bg-stone-500', activeColor: 'bg-stone-400', play: function(f,d,v,t){playTrack(this, f, d, v, t)} },
            { id: 'recorder', name: '直笛', isMelodic: true, pan: 0.6, color: 'bg-emerald-600', activeColor: 'bg-emerald-500', play: function(f,d,v,t){playTrack(this, f, d, v, t)} },
            { id: 'panghu', name: '胖胡', isMelodic: true, pan: -0.5, color: 'bg-rose-600', activeColor: 'bg-rose-500', play: function(f,d,v,t){playTrack(this, f, d, v, t)} },
            { id: 'yehu', name: '椰胡', isMelodic: true, pan: 0.4, color: 'bg-cyan-600', activeColor: 'bg-cyan-500', play: function(f,d,v,t){playTrack(this, f, d, v, t)} },
            { id: 'suonaLow', name: '嗩吶(低)', isMelodic: true, pan: -0.3, color: 'bg-orange-600', activeColor: 'bg-orange-500', play: function(f,d,v,t){playTrack(this, f, d, v, t)} },
            { id: 'suonaHigh', name: '嗩吶(高)', isMelodic: true, pan: 0.2, color: 'bg-yellow-600', activeColor: 'bg-yellow-500', play: function(f,d,v,t){playTrack(this, f, d, v, t)} },
        ];

        const STEPS = 16;
        const DEFAULT_GRID = [
            [true, null, null, null, true, null, null, null, true, null, null, null, true, null, null, null],
            [null, null, true, null, null, null, true, null, null, null, true, null, null, null, true, null],
            [null, true, null, true, null, true, null, true, null, true, null, true, null, true, null, true],

                            } else {

                                    <div class="absolute inset-0 bg-white/85 opacity-0 group-hover:opacity-100 active:opacity-100 transition-opacity z-10 flex flex-col items-center justify-center backdrop-blur-sm">
                                        <div class="text-[10px] font-black text-amber-800 mb-0.5">點選查找</div>

                            <div class="bg-white p-4 rounded-2xl shadow-sm border border-stone-100 flex flex-col gap-3">
                                <div class="flex gap-4">
                                    <a href="https://www.google.com/search?q=新北市客家文化典藏資料庫+${inst.name}" target="_blank" rel="noreferrer" class="w-24 h-24 bg-stone-50 rounded-xl shrink-0 flex flex-col items-center justify-center relative overflow-hidden border border-stone-200 group cursor-pointer text-center">
                                        ${imgContainerInnerHtml}
                                    </a>
                                    <div class="flex-1 flex flex-col justify-center">
                                        <div class="flex justify-between items-start mb-1">
                                            <h4 class="text-base font-bold text-amber-900">${inst.name}</h4>
                                        </div>
                                        <div class="mb-2">
                                            <span class="text-[10px] font-bold bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">${inst.type}</span>
                                        </div>
                                        <p class="text-xs text-stone-600 leading-relaxed line-clamp-3">${inst.desc}</p>
                                    </div>
                                </div>
                                ${inst.audioUrl ? `
                                <div class="pt-2 border-t border-stone-100 mt-1">
                                    <button id="${btnId}" onclick="playPreviewAudio('${inst.audioUrl}', '${btnId}')" class="play-btn-text w-full flex items-center justify-center gap-1.5 text-xs font-medium text-blue-700 bg-blue-50 py-2 rounded-lg hover:bg-blue-100 active:bg-blue-200 transition-colors">
                                        <i data-lucide="volume-2" style="width: 14px; height: 14px;"></i> 試聽聲音
                                    </button>
                                </div>` : ''}
                            </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }

            return `
                <div class="flex flex-col min-h-full w-full">
                    <div class="flex bg-white shadow-sm shrink-0 sticky top-0 z-10 border-b border-stone-200">
                        ${tabsHtml}
                    </div>
                    <div class="p-4 md:p-5 flex-1">
                        ${contentHtml}
                    </div>
                </div>
            `;
        }

        // --- 影音欣賞 ---
        window.playVideo = (idx) => {
            state.appreciation.playingVideo = VIDEOS[idx];
            renderApp();
        };

        window.closeVideo = () => {
            state.appreciation.playingVideo = null;
            renderApp();
        };

        function renderAppreciationView() {
            if (state.appreciation.playingVideo) {
                const video = state.appreciation.playingVideo;
                return `
                    <div class="flex flex-col h-full w-full bg-stone-900 animate-in slide-in-from-right-4 relative z-30">
                        <div class="p-3 flex items-center justify-between bg-black text-white shrink-0">
                            <h3 class="text-sm font-bold truncate pr-4 flex-1 text-stone-300">影片播放</h3>
                            <button onclick="closeVideo()" class="bg-white/20 hover:bg-white/30 text-white rounded-full p-1.5 transition-colors shrink-0">
                                <i data-lucide="x" style="width: 18px; height: 18px;"></i>
                            </button>
                        </div>
                        <div class="w-full bg-black flex items-center justify-center relative aspect-video shadow-xl border-b border-stone-800">
                            <iframe
                                class="absolute inset-0 w-full h-full"
                                src="https://www.youtube.com/embed/${video.videoId}?autoplay=1${video.si ? `&si=${video.si}` : ''}"
                                title="YouTube video player"
                                frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                referrerpolicy="strict-origin-when-cross-origin"
                                allowfullscreen
                            ></iframe>
                        </div>
                        <div class="p-5 text-stone-300 bg-stone-900 flex-1 flex flex-col">
                            <h4 class="font-bold text-white text-base md:text-lg mb-2 leading-relaxed">${video.title}</h4>
                            <p class="text-xs text-stone-400 mb-6">來源頻道：${video.source}</p>
                            
                            <div class="mt-auto bg-stone-800 p-4 rounded-xl border border-stone-700">
                                <p class="text-xs text-stone-400 mb-3 leading-relaxed">
                                    遇到錯誤畫面無法播放？<br/>這可能是因為影片擁有者限制了嵌入播放權限。
                                </p>
                                <a href="${video.url}" target="_blank" rel="noreferrer" class="bg-red-600 text-white px-4 py-2.5 rounded-lg text-sm font-bold hover:bg-red-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2 w-full shadow-sm">
                                    <i data-lucide="external-link" style="width: 16px; height: 16px;"></i> 點此直接前往 YouTube 觀看
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }

            const listHtml = VIDEOS.map((video, idx) => `
                <div onclick="playVideo(${idx})" class="flex flex-col bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden cursor-pointer hover:shadow-md active:scale-[0.98] transition-all group">
                    <div class="h-44 bg-stone-900 relative flex items-center justify-center overflow-hidden shrink-0">
                        <img src="https://img.youtube.com/vi/${video.videoId}/hqdefault.jpg" alt="${video.title}" class="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" />
                        <i data-lucide="play-square" class="text-white z-20 drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] group-hover:scale-110 transition-transform" style="width: 48px; height: 48px;"></i>
                        <div class="absolute top-2 right-2 bg-red-600/90 text-white text-[10px] font-bold px-2 py-0.5 rounded z-20 shadow-sm">
                            YouTube
                        </div>
                    </div>
                    <div class="p-3">
                        <h4 class="font-bold text-stone-800 text-sm leading-snug mb-2 line-clamp-2">${video.title}</h4>
                        <div class="text-xs font-bold text-stone-500 flex items-center justify-between">
                            <span class="flex items-center gap-1 text-blue-600 bg-blue-50 px-2 py-1 rounded-md">
                                <i data-lucide="play-square" style="width: 12px; height: 12px;"></i> 立即播放
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');

            return `
                <div class="p-4 md:p-5 space-y-4 w-full">
                    <div class="bg-amber-100 text-amber-900 p-3 rounded-xl text-sm font-medium flex gap-2 items-start shadow-sm">
                        <i data-lucide="info" class="text-amber-700 shrink-0 mt-0.5" style="width: 18px; height: 18px;"></i>
                        <p>點選下方影片卡片，即可在 APP 內直接播放精彩演出。</p>
                    </div>
                    <div class="space-y-4 pb-4">
                        ${listHtml}
                    </div>
                </div>
            `;
        }

        // --- 遊戲測驗與拼貼引擎 ---
        window.switchGameView = (view) => {
            stopPuzzlePlayback();
            state.game.subView = view;
            if (view === 'quiz') {
                // 初始化並將 9 道題進行隨機打亂，確保每次玩都是新體驗
                state.quiz = { 
                    currentQ: 0, 
                    score: 0, 
                    showResult: false, 
                    selectedOption: null,
                    questions: shuffleArray(QUIZ_QUESTIONS) 
                };
            } else if (view === 'puzzle') {
                if (!state.puzzle.isCloudLoaded && !state.puzzle.isProcessing) {
                    setTimeout(() => window.puzzleLoadCloudAudios(), 100);
                }
            }
            renderApp();
        };

        window.answerQuiz = (idx) => {
            if (state.quiz.selectedOption !== null) return;
            state.quiz.selectedOption = idx;
            
            const currentQObject = state.quiz.questions[state.quiz.currentQ];
            if (idx === currentQObject.answer) {
                state.quiz.score++;
                AudioEngine.playSynth('dingDang', 1200, 0.4, 0, 0.8, 0);
            } else {
                AudioEngine.playSynth('tanggu', 80, 0.5, 0, 1.0, 0);
            }
            renderApp();

            setTimeout(() => {
                if (state.quiz.currentQ < state.quiz.questions.length - 1) {
                    state.quiz.currentQ++;
                    state.quiz.selectedOption = null;
                } else {
                    state.quiz.showResult = true;
                }
                renderApp();
            }, 1000);
        };

        window.puzzleLoadCloudAudios = async () => {
            if (state.puzzle.isProcessing || state.puzzle.isCloudLoaded) return;
            state.puzzle.isProcessing = true;
            AudioEngine.init();
            renderApp(); 
            
            const baseUrl = "https://kiddyhakka.github.io/M11475002/eight";
            let updatedUploads = { ...state.puzzle.uploadedFiles };

            const fileMapping = {
                'bigGong': '大鑼', 'smallGong': '小鑼', 'dingDang': '叮噹', 'bo': '鈸',
                'tanggu': '堂鼓', 'bangziLow': '梆子(低)', 'bangziHigh': '梆子(高)',
                'recorder': '直笛', 'panghu': '胖胡', 'yehu': '椰胡',
                'suonaLow': '嗩吶(低)', 'suonaHigh': '嗩吶(高)'
            };

            for (const track of TRACKS) {
                try {
                    const baseName = fileMapping[track.id] || track.name;
                    let finalName = `${baseName}.mp3`;
                    let response = await fetch(`${baseUrl}/${encodeURIComponent(baseName)}.mp3`);
                    if (!response.ok) { response = await fetch(`${baseUrl}/${encodeURIComponent(baseName)}.wav`); finalName = `${baseName}.wav`; }
                    if (!response.ok) { response = await fetch(`${baseUrl}/${encodeURIComponent(baseName)}.m4a`); finalName = `${baseName}.m4a`; }

                    if (response.ok) {
                        const blob = await response.blob();
                        const file = new File([blob], finalName, { type: blob.type || 'audio/mpeg' });
                        const result = await AudioEngine.loadSmartSample(track.id, file, track.isMelodic);
                        updatedUploads[track.id] = { name: '已載入', notes: result.extracted };
                    }
                } catch (err) { console.error(`載入 ${track.name} 失敗:`, err); }
            }
            
            state.puzzle.uploadedFiles = updatedUploads;
            state.puzzle.isProcessing = false;
            state.puzzle.isCloudLoaded = true;
            renderApp();
        };

        window.puzzleToggleCell = (trackIndex, stepIndex) => {
            AudioEngine.init();
            const track = TRACKS[trackIndex];
            const currentVal = state.puzzle.grid[trackIndex][stepIndex];

            if (track.isMelodic) {
                if (currentVal === state.puzzle.selectedTool) {
                    state.puzzle.grid[trackIndex][stepIndex] = null; 
                } else {
                    state.puzzle.grid[trackIndex][stepIndex] = state.puzzle.selectedTool;
                    if (state.puzzle.selectedTool !== 'tie') {
                        track.play(PENTATONIC_SCALE[state.puzzle.selectedTool].freq, 0.5, 1.0, 0); 
                    }
                }
            } else {
                if (currentVal) {
                    state.puzzle.grid[trackIndex][stepIndex] = null;
                } else {
                    state.puzzle.grid[trackIndex][stepIndex] = true;
                    track.play(null, 0.5, 1.0, 0); 
                }
            }
            renderApp();
        };

        window.puzzlePlayStep = (step) => {
            const stepDurationSec = (60000 / state.puzzle.bpm / 4) / 1000;
            TRACKS.forEach((track, trackIndex) => {
                const cellValue = state.puzzle.grid[trackIndex][step];
                if (cellValue !== null && cellValue !== 'tie') {
                    let tieCount = 0;
                    for (let i = 1; i < STEPS; i++) {
                        if (state.puzzle.grid[trackIndex][(step + i) % STEPS] === 'tie') { tieCount++; } else { break; }
                    }
                    const totalDuration = stepDurationSec * (1 + tieCount);
                    const humanizeOffset = state.puzzle.humanize ? (Math.random() * 0.03 - 0.015) : 0;
                    const velocity = state.puzzle.humanize ? (0.8 + Math.random() * 0.2) : 1.0;

                    if (track.isMelodic) {
                        track.play(PENTATONIC_SCALE[cellValue].freq, totalDuration, velocity, humanizeOffset);
                    } else {
                        track.play(null, totalDuration, velocity, humanizeOffset); 
                    }
                }
            });
        };

        window.puzzleUpdatePlayheadUI = (step) => {
            for(let t=0; t<TRACKS.length; t++){
                for(let s=0; s<STEPS; s++){
                    const el = document.getElementById(`puzzle-cell-${t}-${s}`);
                    if(el) {
                        if(s === step && state.puzzle.isPlaying) {
                            el.classList.add('ring-2', 'ring-blue-400', 'ring-offset-1', 'z-10');
                        } else {
                            el.classList.remove('ring-2', 'ring-blue-400', 'ring-offset-1', 'z-10');
                        }
                    }
                }
            }
        };

        window.puzzleTogglePlay = () => {
            AudioEngine.init();
            if (state.puzzle.isPlaying) {
                state.puzzle.isPlaying = false;
                clearInterval(state.puzzle.timerRef);
                state.puzzle.currentStep = 0;
                state.puzzle.currentStepRef = 0;
                puzzleUpdatePlayheadUI(0);
                renderApp();
            } else {
                state.puzzle.isPlaying = true;
                const stepDuration = (60000 / state.puzzle.bpm) / 4;
                state.puzzle.timerRef = setInterval(() => {
                    puzzlePlayStep(state.puzzle.currentStepRef);
                    state.puzzle.currentStep = state.puzzle.currentStepRef;
                    puzzleUpdatePlayheadUI(state.puzzle.currentStepRef);
                    state.puzzle.currentStepRef = (state.puzzle.currentStepRef + 1) % STEPS;
                }, stepDuration);
                renderApp();
            }
        };

        window.puzzleClearGrid = () => {
            state.puzzle.grid = Array.from({ length: TRACKS.length }, () => Array(STEPS).fill(null));
            state.puzzle.currentStep = 0;
            state.puzzle.currentStepRef = 0;
            if(state.puzzle.isPlaying) puzzleTogglePlay();
            renderApp();
        };

        window.puzzleLoadExample = () => {
            state.puzzle.grid = JSON.parse(JSON.stringify(DEFAULT_GRID));
            state.puzzle.currentStep = 0;
            state.puzzle.currentStepRef = 0;
            if(state.puzzle.isPlaying) puzzleTogglePlay();
            renderApp();
        };

        window.puzzleSetTool = (tool) => {
            state.puzzle.selectedTool = tool;
            renderApp();
        };

        window.puzzleSetBpm = (val) => {
            state.puzzle.bpm = Number(val);
            document.getElementById('bpm-display').innerHTML = `<i data-lucide="sliders" style="width: 16px; height: 16px;"></i> 速度: ${state.puzzle.bpm}`;
            lucide.createIcons();
            if (state.puzzle.isPlaying) {
                clearInterval(state.puzzle.timerRef);
                const stepDuration = (60000 / state.puzzle.bpm) / 4;
                state.puzzle.timerRef = setInterval(() => {
                    puzzlePlayStep(state.puzzle.currentStepRef);
                    state.puzzle.currentStep = state.puzzle.currentStepRef;
                    puzzleUpdatePlayheadUI(state.puzzle.currentStepRef);
                    state.puzzle.currentStepRef = (state.puzzle.currentStepRef + 1) % STEPS;
                }, stepDuration);
            }
        };

        window.puzzleSetReverb = (val) => {
            state.puzzle.reverbLevel = Number(val);
            AudioEngine.setReverbLevel(state.puzzle.reverbLevel);
            const wIcon = document.getElementById('reverb-icon');
            if(wIcon) wIcon.className = state.puzzle.reverbLevel > 0 ? "text-blue-400" : "";
        };

        window.puzzlePreviewTrack = (trackId) => {
            AudioEngine.init();
            const track = TRACKS.find(t => t.id === trackId);
            if(track.isMelodic) {
                const pitchIndex = state.puzzle.selectedTool === 'tie' ? 2 : state.puzzle.selectedTool; 
                track.play(PENTATONIC_SCALE[pitchIndex].freq, 1.0, 1.0, 0);
            } else track.play(null, 1.0, 1.0, 0);
        };

        window.uploadTrackSample = async (trackId, input) => {
            if (!input.files || input.files.length === 0) return;
            const file = input.files[0];
            const track = TRACKS.find(t => t.id === trackId);
            if (!track) return;
            
            state.puzzle.isProcessing = true;
            renderApp();
            try {
                const result = await AudioEngine.loadSmartSample(trackId, file, track.isMelodic);
                state.puzzle.uploadedFiles[trackId] = { name: file.name, notes: result.extracted };
                showNotice("上傳成功", `已載入「${track.name}」自訂音訊！`);
            } catch (e) {
                console.error(e);
                showNotice("上傳失敗", "解碼音訊失敗，請更換音檔格式重試。");
            } finally {
                state.puzzle.isProcessing = false;
                renderApp();
            }
        };

        window.saveGridToSlot = (slot) => {
            try {
                localStorage.setItem(`hakka_eight_grid_slot_${slot}`, JSON.stringify(state.puzzle.grid));
                showNotice("儲存成功", `已成功儲存至「進度存檔槽 ${slot}」！`);
            } catch (e) {
                console.error(e);
                showNotice("儲存失敗", "寫入本地快取出錯。");
            }
        };

        window.loadGridFromSlot = (slot) => {
            try {
                const data = localStorage.getItem(`hakka_eight_grid_slot_${slot}`);
                if (data) {
                    state.puzzle.grid = JSON.parse(data);
                    renderApp();
                    showNotice("讀取成功", `已成功載入「存檔槽 ${slot}」的合奏！`);
                } else {
                    showNotice("無資料", `「存檔槽 ${slot}」尚無儲存進度。`);
                }
            } catch (e) {
                console.error(e);
                showNotice("讀取失敗", "資料格式不符。");
            }
        };

        window.showNotice = (title, message) => {
            let container = document.getElementById('notice-container');
            if (!container) {
                const layout = document.querySelector('main');
                if (layout) {
                    container = document.createElement('div');
                    container.id = 'notice-container';
                    container.className = 'absolute top-4 left-1/2 -translate-x-1/2 bg-stone-900/90 text-amber-100 text-[11px] font-bold px-4 py-2.5 rounded-full shadow-lg z-50 transition-all transform scale-95 opacity-0 pointer-events-none w-max max-w-[80%] text-center';
                    layout.appendChild(container);
                }
            }
            if (container) {
                container.innerHTML = `<strong>${title}:</strong> ${message}`;
                container.classList.remove('opacity-0', 'scale-95');
                container.classList.add('opacity-100', 'scale-100');
                setTimeout(() => {
                    container.classList.remove('opacity-100', 'scale-100');
                    container.classList.add('opacity-0', 'scale-95');
                }, 2800);
            }
        };

        function renderPuzzleView() {
            const toolsHtml = PENTATONIC_SCALE.map((pitch, index) => `
                <button onclick="puzzleSetTool(${index})" class="px-2.5 py-1.5 rounded-lg text-xs font-bold transition-all ${state.puzzle.selectedTool === index ? 'bg-blue-600 text-white shadow-md transform scale-105' : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-100'}">
                    ${pitch.label}
                </button>
            `).join('');

            const padsHtml = TRACKS.map(track => {
                const hasCustomSample = !!state.puzzle.uploadedFiles[track.id];
                const padClass = hasCustomSample ? 'bg-emerald-600 hover:bg-emerald-500 ring-2 ring-emerald-300 ring-offset-1 shadow-emerald-200/50' : `${track.color} hover:${track.activeColor}`;
                return `
                <div class="relative group">
                    <button onclick="puzzlePreviewTrack('${track.id}')" class="w-full ${padClass} text-white py-2.5 rounded-xl shadow-md transition-all active:scale-95 flex flex-col items-center justify-center gap-1 min-h-[58px]">
                        <span class="text-xs font-bold z-10">${track.name}</span>
                        ${hasCustomSample ? '<span class="text-[9px] font-bold opacity-90">已錄入</span>' : '<span class="text-[9px] opacity-75">點擊敲響</span>'}
                    </button>
                    <label class="absolute -top-1 -right-1 bg-white text-stone-700 hover:text-amber-700 w-5 h-5 rounded-full flex items-center justify-center border border-stone-200 shadow-sm cursor-pointer hover:bg-amber-100 z-10">
                        <input type="file" accept="audio/*" onchange="uploadTrackSample('${track.id}', this)" class="hidden" />
                        <i data-lucide="upload" style="width: 10px; height: 10px;"></i>
                    </label>
                </div>`;
            }).join('');

            const gridHtml = TRACKS.map((track, trackIndex) => {
                const hasCustomSample = !!state.puzzle.uploadedFiles[track.id];
                const trackBaseColor = hasCustomSample ? 'bg-emerald-500' : track.color;
                
                const cellsHtml = state.puzzle.grid[trackIndex].map((cellValue, stepIndex) => {
                    const isActive = cellValue !== null;
                    const isTie = cellValue === 'tie';
                    const activeClasses = isTie 
                        ? `${trackBaseColor} opacity-70 shadow-inner scale-[0.98] border-transparent text-white rounded-l-none border-l-0` 
                        : `${trackBaseColor} shadow-inner scale-[0.97] border-transparent text-white`;
                    const currentStepClass = (state.puzzle.currentStep === stepIndex && state.puzzle.isPlaying) ? 'ring-2 ring-blue-400 ring-offset-1 z-10' : '';
                    
                    let innerHtml = '';
                    if (isActive && track.isMelodic && !isTie) innerHtml = `<span class="text-[9px] font-bold drop-shadow-md">${PENTATONIC_SCALE[cellValue].label}</span>`;
                    else if (isActive && track.isMelodic && isTie) innerHtml = `<span class="text-[9px] font-bold opacity-75">—</span>`;

                    return `<button id="puzzle-cell-${trackIndex}-${stepIndex}" onclick="puzzleToggleCell(${trackIndex}, ${stepIndex})" class="flex-1 h-9 min-w-[2rem] rounded transition-all duration-150 border flex items-center justify-center ${stepIndex % 4 === 0 && !isActive ? 'border-stone-400' : 'border-stone-200'} ${isActive ? activeClasses : 'bg-white hover:bg-stone-50'} ${currentStepClass}">${innerHtml}</button>`;
                }).join('');

                return `
                <div class="flex items-center gap-1.5 group w-max pr-4">
                    <div class="w-16 shrink-0 text-center font-bold text-white text-[10px] py-2 rounded shadow-sm flex flex-col items-center justify-center ${trackBaseColor}">
                        <span>${track.name}</span>
                    </div>
                    <div class="flex-1 flex gap-0.5 bg-stone-100 p-1 rounded-lg border border-stone-200 shrink-0">
                        ${cellsHtml}
                    </div>
                </div>`;
            }).join('');

            let loadStatusBanner = '';
            if (state.puzzle.isProcessing) {
                loadStatusBanner = `
                <div class="bg-amber-100 border border-amber-200 text-amber-900 text-xs px-3 py-2 rounded-xl flex items-center gap-2 animate-pulse mb-3">
                    <div class="w-3.5 h-3.5 border-2 border-amber-700 border-t-transparent rounded-full animate-spin"></div>
                    <span>大夥房雲端原音加載/解碼中，完成前使用高擬真物理合成聲...</span>
                </div>`;
            } else if (state.puzzle.isCloudLoaded) {
                loadStatusBanner = `
                <div class="bg-emerald-50 border border-emerald-200 text-emerald-800 text-xs px-3 py-2 rounded-xl flex items-center gap-1.5 mb-3">
                    <i data-lucide="check" style="width: 14px; height: 14px;" class="text-emerald-600"></i>
                    <span>大夥房原聲預載已就緒！點擊右上角 <i data-lucide="upload" style="width: 11px; height: 11px; display: inline-block;"></i> 可上傳自製錄音。</span>
                </div>`;
            }

            return `
                <div class="flex flex-col h-full w-full bg-stone-100 absolute inset-0 z-30 animate-in slide-in-from-right-4 overflow-y-auto overflow-x-hidden">
                    <div class="p-4 space-y-6 max-w-full pb-24">
                        ${loadStatusBanner}
                        <section>
                            <h3 class="text-sm font-bold text-stone-700 flex items-center gap-1.5 mb-3">
                                <i data-lucide="volume-2" class="text-stone-500" style="width: 16px; height: 16px;"></i> 1. 樂器打擊樂坊 (點按敲響，右上角可上傳錄音)
                            </h3>
                            <div class="grid grid-cols-4 sm:grid-cols-6 gap-2">
                                ${padsHtml}
                            </div>
                        </section>
                        <section>
                            <div class="flex flex-col sm:flex-row justify-between mb-3 gap-2">
                                <h3 class="text-sm font-bold text-stone-700 flex items-center gap-1.5">
                                    <i data-lucide="music" class="text-stone-500" style="width: 16px; height: 16px;"></i> 2. 12 軌合奏編排
                                </h3>
                                <div class="bg-stone-50 p-1.5 rounded-lg border border-stone-200 shadow-sm flex items-center gap-1 overflow-x-auto no-scrollbar">
                                    <span class="text-[10px] font-bold text-stone-600 px-1 whitespace-nowrap">畫筆：</span>
                                    ${toolsHtml}
                                    <div class="w-px h-4 bg-stone-300 mx-0.5"></div>
                                    <button onclick="puzzleSetTool('tie')" class="px-2 py-1.5 rounded-lg text-xs font-bold transition-all ${state.puzzle.selectedTool === 'tie' ? 'bg-indigo-600 text-white shadow-md transform scale-105' : 'bg-indigo-50 text-indigo-700 border border-indigo-200 hover:bg-indigo-100'}">
                                        延音(—)
                                    </button>
                                </div>
                            </div>
                            <div class="overflow-x-auto pb-4 no-scrollbar border border-stone-200 rounded-xl bg-white p-2">
                                <div class="min-w-[max-content] space-y-1">
                                    ${gridHtml}
                                </div>
                            </div>
                        </section>
                        <section class="bg-stone-800 p-4 rounded-xl border border-stone-900 flex flex-col gap-4 shadow-lg text-white">
                            <div class="flex justify-between items-center gap-2">
                                <button onclick="puzzleTogglePlay()" class="flex-1 flex justify-center items-center gap-1.5 py-2.5 rounded-full text-sm font-extrabold text-white transition-all shadow-md active:scale-95 ${state.puzzle.isPlaying ? 'bg-red-500 hover:bg-red-600' : 'bg-emerald-500 hover:bg-emerald-400'}">
                                    <i data-lucide="${state.puzzle.isPlaying ? 'square' : 'play'}" style="width: 16px; height: 16px; fill: currentColor;"></i>
                                    ${state.puzzle.isPlaying ? '停止' : '播放'}
                                </button>
                                <button onclick="puzzleClearGrid()" class="flex-none bg-stone-700 p-2.5 rounded-full hover:bg-stone-600 transition-all text-red-400 active:scale-95 border border-stone-600">
                                    <i data-lucide="trash-2" style="width: 18px; height: 18px;"></i>
                                </button>
                            </div>
                            <div class="bg-stone-900 p-3 rounded-xl border border-stone-700/50 space-y-4">
                                <div class="flex justify-between items-center">
                                    <label class="flex items-center gap-2 cursor-pointer group">
                                        <div class="w-8 h-5 rounded-full transition-colors flex items-center px-0.5 ${state.puzzle.humanize ? 'bg-emerald-500' : 'bg-stone-600'}">
                                            <div class="w-4 h-4 rounded-full bg-white transition-transform ${state.puzzle.humanize ? 'translate-x-3' : ''}"></div>
                                        </div>
                                        <span class="text-xs font-bold text-stone-300 flex items-center gap-1">
                                            <i data-lucide="wind" style="width: 14px; height: 14px;" class="${state.puzzle.humanize ? 'text-emerald-400' : ''}"></i> 人性化
                                        </span>
                                    </label>
                                    <button onclick="puzzleLoadExample()" class="text-[10px] bg-stone-700 text-stone-300 px-3 py-1.5 rounded-full flex items-center gap-1 active:scale-95">
                                        <i data-lucide="folder-open" style="width: 12px; height: 12px;"></i> 大夥房範例
                                    </button>
                                </div>
                                <div class="flex items-center gap-2">
                                    <label id="bpm-display" class="text-xs font-bold text-stone-300 whitespace-nowrap flex items-center gap-1 w-20">
                                        <i data-lucide="sliders" style="width: 14px; height: 14px;"></i> 速度: ${state.puzzle.bpm}
                                    </label>
                                    <input type="range" min="60" max="160" value="${state.puzzle.bpm}" oninput="puzzleSetBpm(this.value)" class="flex-1 h-2 bg-stone-700 rounded-lg appearance-none cursor-pointer accent-emerald-500" />
                                </div>
                                <div class="flex items-center gap-2">
                                    <label class="text-xs font-bold text-stone-300 whitespace-nowrap flex items-center gap-1 w-20">
                                        <i id="reverb-icon" data-lucide="waves" style="width: 14px; height: 14px;" class="${state.puzzle.reverbLevel > 0 ? 'text-blue-400' : ''}"></i> 空間殘響
                                    </label>
                                    <input type="range" min="0" max="1" step="0.05" value="${state.puzzle.reverbLevel}" oninput="puzzleSetReverb(this.value)" class="flex-1 h-2 bg-stone-700 rounded-lg appearance-none cursor-pointer accent-blue-500" />
                                </div>

                                <!-- 課堂進度存檔區 -->
                                <div class="mt-4 pt-3 border-t border-stone-800">
                                    <h4 class="text-[11px] font-bold text-stone-400 mb-2 flex items-center gap-1">
                                        <i data-lucide="bookmark" style="width: 13px; height: 13px;"></i> 課堂合奏進度存檔槽
                                    </h4>
                                    <div class="grid grid-cols-3 gap-2">
                                        ${[1, 2, 3].map(slot => `
                                            <div class="bg-stone-950 p-1.5 rounded-lg border border-stone-800 text-center flex flex-col gap-1">
                                                <span class="text-[10px] text-stone-500">存檔 ${slot}</span>
                                                <div class="flex gap-1 justify-center">
                                                    <button onclick="saveGridToSlot(${slot})" class="bg-amber-700 hover:bg-amber-600 text-[10px] text-white py-0.5 px-1.5 rounded">儲存</button>
                                                    <button onclick="loadGridFromSlot(${slot})" class="bg-stone-800 hover:bg-stone-700 text-[10px] text-stone-300 py-0.5 px-1.5 rounded">載入</button>
                                                </div>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            `;
        }

        function renderGameView() {
            if (state.game.subView === 'puzzle') return renderPuzzleView();
            if (state.game.subView === 'quiz') {
                if (state.quiz.showResult) {
                    const result = getScoreTitle(state.quiz.score, state.quiz.questions.length);
                    return `
                        <div class="p-6 h-full flex flex-col items-center justify-center animate-in zoom-in w-full">
                            <div class="bg-amber-100 w-24 h-24 rounded-full flex items-center justify-center mb-4 shadow-inner border-4 border-amber-200">
                                <i data-lucide="trophy" class="text-amber-600" style="width: 48px; height: 48px;"></i>
                            </div>
                            <h2 class="text-2xl font-black text-amber-900 mb-2">${result.title}</h2>
                            <p class="text-sm text-stone-600 text-center mb-8">${result.msg}</p>
                            <div class="bg-white px-8 py-6 rounded-2xl shadow-sm border border-stone-200 mb-8 w-full text-center">
                                <p class="text-sm text-stone-500 font-bold mb-1">最終測驗得分</p>
                                <p class="text-5xl font-black text-amber-600">${state.quiz.score} <span class="text-2xl text-stone-400">/ ${state.quiz.questions.length}</span></p>
                            </div>
                            <div class="flex flex-col gap-3 w-full">
                                <button onclick="switchGameView('quiz')" class="w-full bg-amber-600 text-white py-3.5 rounded-xl text-sm font-bold hover:bg-amber-700 active:scale-[0.98] transition-all shadow-md">再玩一次 (重新打亂題目)</button>
                                <button onclick="switchGameView('menu')" class="w-full bg-stone-200 text-stone-800 py-3.5 rounded-xl text-sm font-bold hover:bg-stone-300 active:scale-[0.98] transition-all">回遊戲選單</button>
                            </div>
                        </div>
                    `;
                }

                const question = state.quiz.questions[state.quiz.currentQ];
                const optionsHtml = question.options.map((opt, idx) => {
                    let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all font-bold text-sm text-stone-700 shadow-sm flex items-center ";
                    if (state.quiz.selectedOption === null) {
                        btnClass += "border-stone-100 bg-white hover:border-amber-400 active:bg-amber-50";
                    } else {
                        if (idx === question.answer) btnClass += "border-green-500 bg-green-50 text-green-800 shadow-md";
                        else if (idx === state.quiz.selectedOption) btnClass += "border-red-500 bg-red-50 text-red-800 opacity-90";
                        else btnClass += "border-stone-100 opacity-50 bg-stone-50";
                    }
                    return `
                        <button onclick="answerQuiz(${idx})" ${state.quiz.selectedOption !== null ? 'disabled' : ''} class="${btnClass}">
                            <span class="inline-block w-6 h-6 bg-stone-100 rounded-full text-center leading-6 mr-3 text-xs border border-stone-200 shrink-0 font-mono">
                                ${String.fromCharCode(65 + idx)}
                            </span>
                            <span class="flex-1">${opt}</span>
                        </button>
                    `;
                }).join('');

                return `
                    <div class="p-5 flex flex-col h-full w-full">
                        <div class="flex items-center justify-between mb-6">
                            <button onclick="switchGameView('menu')" class="flex items-center gap-1 text-stone-500 hover:text-stone-800 font-bold bg-stone-100 px-3 py-1.5 rounded-lg text-sm">
                                <i data-lucide="chevron-left" style="width: 16px; height: 16px;"></i> 返回
                            </button>
                            <span class="text-xs font-bold text-amber-800 bg-amber-100 px-3 py-1 rounded-full border border-amber-200 font-mono">
                                問題 ${state.quiz.currentQ + 1} / ${state.quiz.questions.length}
                            </span>
                        </div>
                        <div class="flex-1 flex flex-col w-full">
                            <h3 class="text-lg font-black text-stone-800 leading-relaxed mb-6 bg-white p-4 rounded-xl border border-stone-100 shadow-sm">
                                ${question.question}
                            </h3>
                            <div class="space-y-3 w-full">
                                ${optionsHtml}
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="p-5 flex flex-col h-full w-full">
                    <div class="text-center mb-6 mt-4">
                        <h3 class="font-black text-xl text-amber-900 mb-1">創作與測驗挑戰</h3>
                        <p class="text-xs text-stone-500 font-medium">請選擇您想挑戰的遊戲項目：</p>
                    </div>
                    <div class="flex flex-col gap-4">
                        <button onclick="switchGameView('puzzle')" class="w-full text-left bg-white p-5 rounded-2xl border border-stone-200 shadow-sm flex items-center gap-4 hover:border-blue-400 hover:bg-blue-50 transition-all group active:scale-[0.98]">
                            <div class="bg-blue-50 p-4 rounded-xl text-blue-500 group-hover:bg-blue-500 group-hover:text-white transition-colors">
                                <i data-lucide="puzzle" style="width: 32px; height: 32px;"></i>
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-base mb-1 text-stone-800">八音拼貼</h4>
                                <p class="text-xs text-stone-500">自己創作八音樂曲，馬上聽</p>
                            </div>
                            <i data-lucide="chevron-left" class="text-stone-300 rotate-180" style="width: 20px; height: 20px;"></i>
                        </button>
                        <button onclick="switchGameView('quiz')" class="w-full text-left bg-white p-5 rounded-2xl border border-stone-200 shadow-sm flex items-center gap-4 hover:border-amber-500 hover:bg-amber-50 transition-all group active:scale-[0.98]">
                            <div class="bg-amber-50 p-4 rounded-xl text-amber-500 group-hover:bg-amber-500 group-hover:text-white transition-colors">
                                <i data-lucide="help-circle" style="width: 32px; height: 32px;"></i>
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-base mb-1 text-stone-800">八音知識小測驗</h4>
                                <p class="text-xs text-stone-500">試試看，八音達人就是你！</p>
                            </div>
                            <i data-lucide="chevron-left" class="text-stone-300 rotate-180" style="width: 20px; height: 20px;"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // 5. 初始化執行
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
        });
    </script>
</body>
</html>
