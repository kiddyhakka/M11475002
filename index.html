<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>鬧(Now)打八音 APP</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- 自訂動畫與樣式 -->
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideInBottom { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        
        .animate-in { animation-fill-mode: both; }
        .fade-in { animation-name: fadeIn; animation-duration: 300ms; }
        .zoom-in { animation-name: zoomIn; animation-duration: 300ms; }
        .slide-in-from-bottom-4 { animation-name: slideInBottom; animation-duration: 500ms; }
        .slide-in-from-right-4 { animation-name: slideInRight; animation-duration: 300ms; }

        /* 隱藏捲軸但保留滾動功能 (美化介面) */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-stone-200 flex justify-center font-sans text-stone-800 selection:bg-amber-200 min-h-screen">

    <!-- 模擬手機 APP 外觀的容器 -->
    <div class="w-full max-w-md bg-stone-50 shadow-2xl relative flex flex-col h-[100dvh] overflow-hidden">
        
        <!-- Header - APP 風格 -->
        <header class="bg-amber-700 text-white p-4 flex items-center justify-between shrink-0 shadow-md z-20 relative">
            <div id="header-left-slot">
                <!-- 返回按鈕將透過 JS 動態產生 -->
            </div>
            <h1 class="text-lg md:text-xl font-bold tracking-wider absolute left-1/2 -translate-x-1/2 flex items-center gap-2 w-max">
                <i data-lucide="music" style="width: 20px; height: 20px;" class="hidden sm:block"></i> 鬧(Now)打八音
            </h1>
            <div class="w-16"></div> <!-- 佔位用 -->
        </header>

        <!-- 內容區域 -->
        <main id="app-root" class="flex-1 overflow-y-auto no-scrollbar bg-amber-50/30 flex flex-col relative">
            <!-- 畫面內容將由 JavaScript 動態渲染 -->
        </main>

        <!-- Footer 版權聲明 - APP 風格 -->
        <footer class="bg-stone-900 text-stone-400 text-[10px] p-3 text-center shrink-0 z-20">
            <p>本APP為課堂教學使用，無商業用途。</p>
            <p class="mt-0.5 opacity-80">部分內容取材自公開網路、紙本出版品或網站，版權屬原作者所有。</p>
        </footer>
    </div>

    <!-- 應用程式邏輯 -->
    <script>
        // ==========================================
        // 1. Gemini API Helper
        // ==========================================
        const generateGeminiContent = async (prompt, systemInstruction) => {
            const apiKey = ""; // API Key 會在執行環境自動提供
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            
            const fetchWithRetry = async (retries = 5) => {
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let i = 0; i < retries; i++) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error('API error');
                        return await response.json();
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(r => setTimeout(r, delays[i]));
                    }
                }
            };

            try {
                const data = await fetchWithRetry();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "哎呀，大師正在閉關修煉，請稍後再試！";
            } catch (error) {
                return "連線失敗，大師暫時無法回應，請檢查網路後再試。";
            }
        };

        // ==========================================
        // 2. Mock Data 靜態資料
        // ==========================================
        const INTRO_TABS = ['客家八音是什麼?', '樂器介紹'];

        const INSTRUMENTS = [
            { name: '嗩吶', desc: '客家八音最重要的主旋律樂器，聲音高亢明亮。', type: '吹管樂器', imageUrl: 'https://www.hakka-portal.ntpc.gov.tw/archive/article/8/normal/part_623_7055099_94710.jpg' },
            { name: '二胡/胖胡', desc: '重要的擦弦樂器，負責和聲與輔助旋律。', type: '擦弦樂器', imageUrl: 'https://dcm.s3.hicloud.net.tw/new/collection/2025-09-12/43c7e3b2-9208-42a1-9398-7ac467762a6c/98ae977c-f197-4378-a97f-05ac67f10b48_f.jpg' },
            { name: '揚琴', desc: '擊弦樂器，音色清脆，常用於伴奏。', type: '擊弦樂器', imageUrl: 'https://collections.culture.tw/ShowGalImage.aspx?SYSUID=17&IMG=KQ5S5NMHM1MXM4KM5KM6MG0V06M6MGMNM4MBMPM4MP0V0BMYKMK5KHM5MJMDMQKAK4KJ5SK7MCMKM65A5SKLKA5SKEKY5MKL5TKJMWKXK8KP5UMS5O5TKQK4K2K6MD0EM2MB06ME0GM6MZ0RMWMF0GME&TEXT=K7KG575Y&FROM=5YKK57' },
            { name: '打擊樂器組', desc: '包含堂鼓、小鈸、大鑼、小鑼等，掌控節奏與氣氛。', type: '打擊樂器', imageUrl: 'https://www.hakka.gov.tw/userfiles/image/%E5%A4%A7%E5%A4%A5%E6%88%BF%E8%97%9D%E8%A1%93%E5%9C%98.jpg' },
        ];

        const VIDEOS = [
            { title: '《HakkaTV電視音樂專輯》天地之樂--打八音', source: 'YouTube', url: 'https://www.youtube.com/watch?v=JJj0j4jpwg4', videoId: 'JJj0j4jpwg4', si: '7vzX0NpOC6lQsbFq' },
            { title: '八音入秋 聲韻傳承｜六堆地區｜《風神舞台》', source: 'YouTube', url: 'https://www.youtube.com/watch?v=knUCcy4_yrw&t=4204s', videoId: 'knUCcy4_yrw' },
            { title: '《八音迎新春》EP22：美濃國中八音社', source: 'YouTube', url: 'https://www.youtube.com/watch?v=acNuUWgdl5Q', videoId: 'acNuUWgdl5Q' },
            { title: '客家電視－「台灣客翻天」八音布魯斯', source: 'YouTube', url: 'https://www.youtube.com/watch?v=3AaqVJhzDAU', videoId: '3AaqVJhzDAU' },
            { title: '《八音迎新春》EP24：大夥房藝術團', source: 'YouTube', url: 'https://www.youtube.com/watch?v=4zDmGd9lWdY&t=1328s', videoId: '4zDmGd9lWdY' },
            { title: '《八音迎新春》 EP45：美濃客家八音團', source: 'YouTube', url: 'https://www.youtube.com/watch?v=f86BSn2MENI', videoId: 'f86BSn2MENI' },
        ];

        const QUIZ_QUESTIONS = [
            { question: '請問客家八音中，哪一個樂器通常負責擔任「主旋律」的靈魂角色？', options: ['二胡', '嗩吶', '揚琴', '堂鼓'], answer: 1 },
            { question: '傳統的「八音」分類，是依據什麼來劃分的？', options: ['製作材料 (金、石、絲、竹等)', '演奏人數', '樂曲長度', '發源地區'], answer: 0 },
            { question: '下列何者「不是」常見的客家八音打擊樂器？', options: ['小鈸', '大鑼', '定音鼓', '堂鼓'], answer: 2 }
        ];

        const getScoreTitle = (score, total) => {
            const percentage = score / total;
            if (percentage === 1) return { title: '八音大神', msg: '太神啦！你對客家八音瞭若指掌！' };
            if (percentage >= 0.8) return { title: '八音名家', msg: '非常厲害！具備深厚的八音知識！' };
            if (percentage >= 0.6) return { title: '八音高手', msg: '表現不錯喔！繼續保持！' };
            if (percentage >= 0.3) return { title: '八音好手', msg: '有點基礎，再多聽多看會更棒！' };
            return { title: '八音新手', msg: '沒關係，從現在開始認識客家八音吧！' };
        };

        // ==========================================
        // 3. 狀態管理 (State)
        // ==========================================
        const state = {
            currentView: 'home',
            intro: { activeTab: 0, aiStories: {} },
            appreciation: { playingVideo: null },
            game: { subView: 'menu' },
            quiz: { currentQ: 0, score: 0, showResult: false, selectedOption: null },
            chat: {
                inputValue: '',
                messages: [{ role: 'model', text: '你好！我是客家八音大師 ✨。關於八音的歷史、樂器或是音樂特色，想問我什麼呢？' }],
                isLoading: false
            }
        };

        // ==========================================
        // 4. 核心渲染機制
        // ==========================================
        function renderApp() {
            const root = document.getElementById('app-root');
            const headerLeft = document.getElementById('header-left-slot');

            // 處理 Header 返回按鈕
            if (state.currentView !== 'home') {
                headerLeft.innerHTML = `
                    <button onclick="navigate('home')" class="flex items-center hover:bg-amber-600 p-1 rounded-lg transition-colors">
                        <i data-lucide="chevron-left" style="width: 24px; height: 24px;"></i>
                        <span class="ml-1 text-sm font-bold">返回</span>
                    </button>
                `;
            } else {
                headerLeft.innerHTML = `<div class="w-16"></div>`;
            }

            // 處理內容視圖
            let viewHtml = '';
            switch (state.currentView) {
                case 'intro': viewHtml = renderIntroView(); break;
                case 'appreciation': viewHtml = renderAppreciationView(); break;
                case 'game': viewHtml = renderGameView(); break;
                case 'ai-chat': viewHtml = renderAiChatView(); break;
                default: viewHtml = renderHomeView(); break;
            }

            root.innerHTML = viewHtml;
            
            // 重新初始化 Icons
            lucide.createIcons();

            // 針對特定視圖的 DOM 操作後處理
            if (state.currentView === 'ai-chat') {
                const chatBox = document.getElementById('chat-history-box');
                if (chatBox) chatBox.scrollTop = chatBox.scrollHeight;
                const chatInput = document.getElementById('chat-input');
                if (chatInput) {
                    chatInput.value = state.chat.inputValue;
                    chatInput.focus();
                }
            }
        }

        // ==========================================
        // 5. 視圖渲染函數與事件處理
        // ==========================================

        // --- 全域導航 ---
        window.navigate = (view) => {
            state.currentView = view;
            if(view === 'game') state.game.subView = 'menu';
            renderApp();
        };

        // --- 首頁 ---
        function renderHomeView() {
            const menus = [
                { id: 'intro', title: '客家八音暨樂器介紹', icon: 'info', color: 'bg-blue-500', desc: '認識傳統與樂器' },
                { id: 'appreciation', title: '客家八音欣賞', icon: 'play-square', color: 'bg-emerald-600', desc: '影音與音樂饗宴' },
                { id: 'game', title: '我是八音達人', icon: 'trophy', color: 'bg-amber-500', desc: '遊戲與測驗挑戰' },
                { id: 'ai-chat', title: '✨ 八音大師解惑', icon: 'message-circle', color: 'bg-purple-600', desc: 'AI 大師在線回答' },
            ];

            let menuHtml = menus.map((menu, idx) => `
                <button onclick="navigate('${menu.id}')" class="w-full text-left group relative overflow-hidden bg-white rounded-2xl shadow-sm border border-stone-200 p-4 flex items-center gap-4 hover:shadow-md hover:border-amber-300 transition-all active:scale-[0.98] animate-in slide-in-from-bottom-4" style="animation-delay: ${idx * 100}ms;">
                    <div class="${menu.color} text-white p-3.5 rounded-xl shadow-inner group-hover:scale-110 transition-transform">
                        <i data-lucide="${menu.icon}" style="width: 28px; height: 28px;"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-base font-bold text-stone-800 group-hover:text-amber-700 transition-colors mb-0.5">${menu.title}</h3>
                        <p class="text-xs text-stone-500 font-medium">${menu.desc}</p>
                    </div>
                    <i data-lucide="chevron-left" class="text-stone-300 rotate-180 group-hover:text-amber-500 transition-colors" style="width: 20px; height: 20px;"></i>
                </button>
            `).join('');

            return `
                <div class="p-6 flex flex-col gap-6 items-center justify-center min-h-full w-full">
                    <div class="mb-4 text-center animate-in slide-in-from-bottom-4">
                        <div class="w-24 h-24 bg-amber-200 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner border-4 border-amber-300">
                            <i data-lucide="music" style="width: 48px; height: 48px;" class="text-amber-700"></i>
                        </div>
                        <h2 class="text-2xl font-black text-amber-900 tracking-wide mb-1">客家音樂世界</h2>
                        <p class="text-sm text-stone-600 font-medium">請選擇下方單元開始探索</p>
                    </div>
                    <div class="w-full flex flex-col gap-4">
                        ${menuHtml}
                    </div>
                </div>
            `;
        }

        // --- 樂器介紹 ---
        window.switchIntroTab = (idx) => {
            state.intro.activeTab = idx;
            renderApp();
        };

        window.handleGetStory = async (idx, instName) => {
            if (!state.intro.aiStories[idx]) state.intro.aiStories[idx] = {};
            state.intro.aiStories[idx] = { loading: true, text: '' };
            renderApp();

            const systemPrompt = "你是一位推廣客家八音的親切老師。";
            const prompt = `請用繁體中文，向國小到國中的學生介紹客家八音中的樂器「${instName}」。用生動有趣的說故事語氣，大約 50~80 字，介紹它最大的特色或有趣的冷知識。請適當加上 emoji。`;
            
            const result = await generateGeminiContent(prompt, systemPrompt);
            state.intro.aiStories[idx] = { loading: false, text: result };
            renderApp();
        };

        function renderIntroView() {
            const tabsHtml = INTRO_TABS.map((tab, idx) => `
                <button onclick="switchIntroTab(${idx})" class="flex-1 py-3 text-sm font-bold transition-all relative ${state.intro.activeTab === idx ? 'text-amber-700 bg-amber-50/50' : 'text-stone-500 hover:bg-stone-50'}">
                    ${tab}
                    ${state.intro.activeTab === idx ? '<div class="absolute bottom-0 left-0 w-full h-1 bg-amber-600 rounded-t-full"></div>' : ''}
                </button>
            `).join('');

            let contentHtml = '';
            if (state.intro.activeTab === 0) {
                contentHtml = `
                    <div class="space-y-4 animate-in fade-in">
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-stone-100">
                            <h3 class="text-lg font-bold text-amber-900 mb-3 flex items-center gap-2 border-b border-amber-100 pb-2">
                                <i data-lucide="help-circle" class="text-amber-600" style="width: 20px; height: 20px;"></i> 什麼是客家八音？
                            </h3>
                            <p class="text-sm leading-relaxed text-stone-700">
                                「客家八音」是客家傳統器樂演奏的代表，過去多在歲時節令、廟會慶典及婚喪喜慶等場合演出，充滿熱鬧歡騰的「鬧」氣氛。<br/><br/>
                                名稱中的「八音」源自古代樂器製作材料的分類（金、石、絲、竹、匏、土、革、木）。資料來源參考了吳榮順老師的《台灣客家八音的傳統與傳習》。
                            </p>
                            <div class="mt-5 bg-amber-50 rounded-xl p-5 flex flex-col items-center justify-center border-2 border-dashed border-amber-300 text-amber-800 gap-3">
                                <span class="font-bold text-base">歷史圖片展區</span>
                                <p class="text-xs text-stone-600 text-center">想看更多珍貴歷史與照片嗎？</p>
                                <a href="https://www.google.com/search?q=新北市客家文化典藏資料庫" target="_blank" rel="noreferrer" class="bg-amber-600 text-white px-5 py-2.5 rounded-full text-xs font-bold hover:bg-amber-700 transition-colors flex items-center gap-1.5 shadow-md active:scale-95">
                                    <i data-lucide="external-link" style="width: 14px; height: 14px;"></i> 至典藏資料庫查找
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                contentHtml = `
                    <div class="space-y-4 animate-in fade-in pb-4">
                        ${INSTRUMENTS.map((inst, idx) => {
                            const story = state.intro.aiStories[idx];
                            const storyHtml = story && !story.loading && story.text ? `
                                <div class="mt-2 p-3 bg-purple-50 rounded-xl border border-purple-100 text-xs text-purple-900 leading-relaxed animate-in fade-in zoom-in">
                                    <div class="font-bold mb-1 flex items-center gap-1.5 text-purple-700">
                                        <i data-lucide="sparkles" style="width: 12px; height: 12px;"></i> 八音小知識
                                    </div>
                                    ${story.text}
                                </div>
                            ` : '';
                            
                            const btnIcon = (story && story.loading) ? '<i data-lucide="loader-2" class="animate-spin" style="width: 14px; height: 14px;"></i>' : '<i data-lucide="sparkles" style="width: 14px; height: 14px;"></i>';
                            
                            const imgHtml = inst.imageUrl ? `
                                <img src="${inst.imageUrl}" alt="${inst.name}" class="absolute inset-0 w-full h-full object-cover z-0" />
                                <div class="absolute inset-0 bg-white/85 opacity-0 group-hover:opacity-100 active:opacity-100 transition-opacity z-10 flex flex-col items-center justify-center backdrop-blur-sm">
                                    <div class="text-[10px] font-black text-amber-800 mb-0.5">至資料庫查找</div>
                                    <i data-lucide="external-link" class="text-amber-600" style="width: 14px; height: 14px;"></i>
                                </div>
                            ` : `
                                <div class="text-xs font-bold text-stone-500 mb-1">${inst.name}圖片</div>
                                <div class="text-[10px] text-stone-400 leading-tight">點擊查找</div>
                                <i data-lucide="external-link" class="text-stone-300 mt-1" style="width: 12px; height: 12px;"></i>
                            `;

                            return `
                            <div class="bg-white p-4 rounded-2xl shadow-sm border border-stone-100 flex flex-col gap-3">
                                <div class="flex gap-4">
                                    <a href="https://www.google.com/search?q=新北市客家文化典藏資料庫+${inst.name}" target="_blank" rel="noreferrer" class="w-24 h-24 bg-stone-50 rounded-xl shrink-0 flex flex-col items-center justify-center relative overflow-hidden border border-stone-200 group cursor-pointer text-center">
                                        ${imgHtml}
                                    </a>
                                    <div class="flex-1 flex flex-col justify-center">
                                        <div class="flex justify-between items-start mb-1">
                                            <h4 class="text-lg font-bold text-amber-900">${inst.name}</h4>
                                        </div>
                                        <div class="mb-2">
                                            <span class="text-[10px] font-bold bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full">${inst.type}</span>
                                        </div>
                                        <p class="text-xs text-stone-600 leading-relaxed line-clamp-3">${inst.desc}</p>
                                    </div>
                                </div>
                                <div class="flex flex-wrap gap-2 pt-2 border-t border-stone-100 mt-1">
                                    <button class="flex-1 flex items-center justify-center gap-1.5 text-xs font-medium text-blue-700 bg-blue-50 py-2 rounded-lg hover:bg-blue-100 active:bg-blue-200 transition-colors">
                                        <i data-lucide="volume-2" style="width: 14px; height: 14px;"></i> 試聽聲音
                                    </button>
                                    <button onclick="handleGetStory(${idx}, '${inst.name}')" ${(story && story.loading) ? 'disabled' : ''} class="flex-1 flex items-center justify-center gap-1.5 text-xs font-medium text-purple-700 bg-purple-50 py-2 rounded-lg hover:bg-purple-100 active:bg-purple-200 disabled:opacity-50 transition-colors">
                                        ${btnIcon} ✨ AI 說故事
                                    </button>
                                </div>
                                ${storyHtml}
                            </div>
                            `;
                        }).join('')}
                    </div>
                `;
            }

            return `
                <div class="flex flex-col min-h-full w-full">
                    <div class="flex bg-white shadow-sm shrink-0 sticky top-0 z-10 border-b border-stone-200">
                        ${tabsHtml}
                    </div>
                    <div class="p-4 md:p-5 flex-1">
                        ${contentHtml}
                    </div>
                </div>
            `;
        }

        // --- 影音欣賞 ---
        window.playVideo = (idx) => {
            state.appreciation.playingVideo = VIDEOS[idx];
            renderApp();
        };

        window.closeVideo = () => {
            state.appreciation.playingVideo = null;
            renderApp();
        };

        function renderAppreciationView() {
            if (state.appreciation.playingVideo) {
                const video = state.appreciation.playingVideo;
                return `
                    <div class="flex flex-col h-full w-full bg-stone-900 animate-in slide-in-from-right-4 relative z-30">
                        <div class="p-3 flex items-center justify-between bg-black text-white shrink-0">
                            <h3 class="text-sm font-bold truncate pr-4 flex-1 text-stone-300">影片播放</h3>
                            <button onclick="closeVideo()" class="bg-white/20 hover:bg-white/30 text-white rounded-full p-1.5 transition-colors shrink-0">
                                <i data-lucide="x" style="width: 18px; height: 18px;"></i>
                            </button>
                        </div>
                        <div class="w-full bg-black flex items-center justify-center relative aspect-video shadow-xl border-b border-stone-800">
                            <iframe
                                class="absolute inset-0 w-full h-full"
                                src="https://www.youtube.com/embed/${video.videoId}?autoplay=1${video.si ? `&si=${video.si}` : ''}"
                                title="YouTube video player"
                                frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                referrerpolicy="strict-origin-when-cross-origin"
                                allowfullscreen
                            ></iframe>
                        </div>
                        <div class="p-5 text-stone-300 bg-stone-900 flex-1 flex flex-col">
                            <h4 class="font-bold text-white text-base md:text-lg mb-2 leading-relaxed">${video.title}</h4>
                            <p class="text-xs text-stone-400 mb-6">來源頻道：${video.source}</p>
                            
                            <div class="mt-auto bg-stone-800 p-4 rounded-xl border border-stone-700">
                                <p class="text-xs text-stone-400 mb-3 leading-relaxed">
                                    遇到錯誤畫面無法播放？<br/>這可能是因為影片擁有者限制了嵌入播放權限。
                                </p>
                                <a href="${video.url}" target="_blank" rel="noreferrer" class="bg-red-600 text-white px-4 py-2.5 rounded-lg text-sm font-bold hover:bg-red-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2 w-full shadow-sm">
                                    <i data-lucide="external-link" style="width: 16px; height: 16px;"></i> 點此直接前往 YouTube 觀看
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            }

            const listHtml = VIDEOS.map((video, idx) => `
                <div onclick="playVideo(${idx})" class="flex flex-col bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden cursor-pointer hover:shadow-md active:scale-[0.98] transition-all group">
                    <div class="h-44 bg-stone-900 relative flex items-center justify-center overflow-hidden shrink-0">
                        <img src="https://img.youtube.com/vi/${video.videoId}/hqdefault.jpg" alt="${video.title}" class="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" />
                        <i data-lucide="play-square" class="text-white z-20 drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)] group-hover:scale-110 transition-transform" style="width: 48px; height: 48px;"></i>
                        <div class="absolute top-2 right-2 bg-red-600/90 text-white text-[10px] font-bold px-2 py-0.5 rounded z-20 shadow-sm">
                            YouTube
                        </div>
                    </div>
                    <div class="p-3">
                        <h4 class="font-bold text-stone-800 text-sm leading-snug mb-2 line-clamp-2">${video.title}</h4>
                        <div class="text-xs font-bold text-stone-500 flex items-center justify-between">
                            <span class="flex items-center gap-1 text-blue-600 bg-blue-50 px-2 py-1 rounded-md">
                                <i data-lucide="play-square" style="width: 12px; height: 12px;"></i> 立即播放
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');

            return `
                <div class="p-4 md:p-5 space-y-4 w-full">
                    <div class="bg-amber-100 text-amber-900 p-3 rounded-xl text-sm font-medium flex gap-2 items-start shadow-sm">
                        <i data-lucide="info" class="text-amber-700 shrink-0 mt-0.5" style="width: 18px; height: 18px;"></i>
                        <p>點選下方影片卡片，即可在 APP 內直接播放精彩演出。</p>
                    </div>
                    <div class="space-y-4 pb-4">
                        ${listHtml}
                    </div>
                </div>
            `;
        }

        // --- 遊戲測驗 ---
        window.switchGameView = (view) => {
            state.game.subView = view;
            if (view === 'quiz') {
                state.quiz = { currentQ: 0, score: 0, showResult: false, selectedOption: null };
            }
            renderApp();
        };

        window.answerQuiz = (idx) => {
            if (state.quiz.selectedOption !== null) return;
            state.quiz.selectedOption = idx;
            
            if (idx === QUIZ_QUESTIONS[state.quiz.currentQ].answer) {
                state.quiz.score++;
            }
            renderApp();

            setTimeout(() => {
                if (state.quiz.currentQ < QUIZ_QUESTIONS.length - 1) {
                    state.quiz.currentQ++;
                    state.quiz.selectedOption = null;
                } else {
                    state.quiz.showResult = true;
                }
                renderApp();
            }, 1000);
        };

        function renderGameView() {
            if (state.game.subView === 'puzzle') {
                return `
                    <div class="p-6 flex flex-col items-center justify-center h-full text-center">
                        <div class="bg-amber-100 w-24 h-24 rounded-full flex items-center justify-center mb-4">
                            <i data-lucide="puzzle" class="text-amber-600" style="width: 48px; height: 48px;"></i>
                        </div>
                        <h3 class="text-xl font-black mb-2 text-stone-800">樂器拼圖 / 音樂拼接</h3>
                        <p class="text-sm text-stone-600 mb-8 max-w-[250px]">即將連接 Chrome Music Lab 與拼圖系統，敬請期待未來擴充功能！</p>
                        <button onclick="switchGameView('menu')" class="px-6 py-2.5 bg-amber-600 text-white rounded-full text-sm font-bold shadow-md hover:bg-amber-700 active:scale-95 transition-all">
                            返回上一頁
                        </button>
                    </div>
                `;
            }

            if (state.game.subView === 'quiz') {
                if (state.quiz.showResult) {
                    const result = getScoreTitle(state.quiz.score, QUIZ_QUESTIONS.length);
                    return `
                        <div class="p-6 h-full flex flex-col items-center justify-center animate-in zoom-in w-full">
                            <div class="bg-amber-100 w-24 h-24 rounded-full flex items-center justify-center mb-4 shadow-inner border-4 border-amber-200">
                                <i data-lucide="trophy" class="text-amber-600" style="width: 48px; height: 48px;"></i>
                            </div>
                            <h2 class="text-2xl font-black text-amber-900 mb-2">${result.title}</h2>
                            <p class="text-sm text-stone-600 text-center mb-8">${result.msg}</p>
                            <div class="bg-white px-8 py-6 rounded-2xl shadow-sm border border-stone-200 mb-8 w-full text-center">
                                <p class="text-sm text-stone-500 font-bold mb-1">最終測驗得分</p>
                                <p class="text-5xl font-black text-amber-600">${state.quiz.score} <span class="text-2xl text-stone-400">/ ${QUIZ_QUESTIONS.length}</span></p>
                            </div>
                            <div class="flex flex-col gap-3 w-full">
                                <button onclick="switchGameView('quiz')" class="w-full bg-amber-600 text-white py-3.5 rounded-xl text-sm font-bold hover:bg-amber-700 active:scale-[0.98] transition-all shadow-md">再玩一次</button>
                                <button onclick="switchGameView('menu')" class="w-full bg-stone-200 text-stone-800 py-3.5 rounded-xl text-sm font-bold hover:bg-stone-300 active:scale-[0.98] transition-all">回遊戲選單</button>
                            </div>
                        </div>
                    `;
                }

                const question = QUIZ_QUESTIONS[state.quiz.currentQ];
                const optionsHtml = question.options.map((opt, idx) => {
                    let btnClass = "w-full text-left p-4 rounded-xl border-2 transition-all font-bold text-sm text-stone-700 shadow-sm flex items-center ";
                    if (state.quiz.selectedOption === null) {
                        btnClass += "border-stone-100 bg-white hover:border-amber-400 active:bg-amber-50";
                    } else {
                        if (idx === question.answer) btnClass += "border-green-500 bg-green-50 text-green-800 shadow-md";
                        else if (idx === state.quiz.selectedOption) btnClass += "border-red-500 bg-red-50 text-red-800 opacity-90";
                        else btnClass += "border-stone-100 opacity-50 bg-stone-50";
                    }
                    return `
                        <button onclick="answerQuiz(${idx})" ${state.quiz.selectedOption !== null ? 'disabled' : ''} class="${btnClass}">
                            <span class="inline-block w-6 h-6 bg-stone-100 rounded-full text-center leading-6 mr-3 text-xs border border-stone-200 shrink-0">
                                ${String.fromCharCode(65 + idx)}
                            </span>
                            <span class="flex-1">${opt}</span>
                        </button>
                    `;
                }).join('');

                return `
                    <div class="p-5 flex flex-col h-full w-full">
                        <div class="flex items-center justify-between mb-6">
                            <button onclick="switchGameView('menu')" class="flex items-center gap-1 text-stone-500 hover:text-stone-800 font-bold bg-stone-100 px-3 py-1.5 rounded-lg text-sm">
                                <i data-lucide="chevron-left" style="width: 16px; height: 16px;"></i> 返回
                            </button>
                            <span class="text-xs font-bold text-amber-800 bg-amber-100 px-3 py-1 rounded-full border border-amber-200">
                                問題 ${state.quiz.currentQ + 1} / ${QUIZ_QUESTIONS.length}
                            </span>
                        </div>
                        <div class="flex-1 flex flex-col w-full">
                            <h3 class="text-lg font-black text-stone-800 leading-relaxed mb-6 bg-white p-4 rounded-xl border border-stone-100 shadow-sm">
                                ${question.question}
                            </h3>
                            <div class="space-y-3 w-full">
                                ${optionsHtml}
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="p-5 flex flex-col h-full w-full">
                    <div class="text-center mb-6 mt-4">
                        <h3 class="font-black text-xl text-amber-900 mb-1">我是八音達人</h3>
                        <p class="text-xs text-stone-500 font-medium">請選擇您想挑戰的遊戲項目：</p>
                    </div>
                    <div class="flex flex-col gap-4">
                        <button onclick="switchGameView('puzzle')" class="w-full text-left bg-white p-5 rounded-2xl border border-stone-200 shadow-sm flex items-center gap-4 hover:border-blue-400 hover:bg-blue-50 transition-all group active:scale-[0.98]">
                            <div class="bg-blue-50 p-4 rounded-xl text-blue-500 group-hover:bg-blue-500 group-hover:text-white transition-colors">
                                <i data-lucide="puzzle" style="width: 32px; height: 32px;"></i>
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-base mb-1 text-stone-800">音樂遊戲體驗</h4>
                                <p class="text-xs text-stone-500">樂器拼圖、Song Maker 音樂拼接</p>
                            </div>
                            <i data-lucide="chevron-left" class="text-stone-300 rotate-180" style="width: 20px; height: 20px;"></i>
                        </button>
                        <button onclick="switchGameView('quiz')" class="w-full text-left bg-white p-5 rounded-2xl border border-stone-200 shadow-sm flex items-center gap-4 hover:border-amber-500 hover:bg-amber-50 transition-all group active:scale-[0.98]">
                            <div class="bg-amber-50 p-4 rounded-xl text-amber-500 group-hover:bg-amber-500 group-hover:text-white transition-colors">
                                <i data-lucide="help-circle" style="width: 32px; height: 32px;"></i>
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-base mb-1 text-stone-800">八音知識小測驗</h4>
                                <p class="text-xs text-stone-500">測試你對客家八音與樂器聲音的了解！</p>
                            </div>
                            <i data-lucide="chevron-left" class="text-stone-300 rotate-180" style="width: 20px; height: 20px;"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        // --- AI 聊天室 ---
        window.handleChatInput = (val) => {
            state.chat.inputValue = val;
        };

        window.checkChatEnter = (e) => {
            if (e.key === 'Enter') handleChatSend();
        };

        window.handleChatSend = async () => {
            const query = state.chat.inputValue.trim();
            if (!query || state.chat.isLoading) return;
            
            state.chat.inputValue = '';
            state.chat.messages.push({ role: 'user', text: query });
            state.chat.isLoading = true;
            renderApp(); // Update UI to show loading

            const systemInstruction = `你是一位充滿熱忱且知識淵博的「客家八音大師」。你的任務是回答使用者關於客家八音、傳統樂器（如嗩吶、二胡、揚琴、打擊樂器）、客家文化的相關問題。
            請遵循以下規則：
            1. 使用繁體中文回答。
            2. 語氣要親切、有趣、鼓勵發問，就像一位慈祥的老師。
            3. 適時使用 Emoji 來增加親和力。
            4. 字數盡量控制在 100~150 字以內，讓年輕人或小朋友也能輕鬆讀懂。
            5. 如果問題與客家八音、音樂、客家文化無關，請委婉地引導回八音的主題。`;

            const result = await generateGeminiContent(query, systemInstruction);
            
            state.chat.messages.push({ role: 'model', text: result });
            state.chat.isLoading = false;
            renderApp();
        };

        function renderAiChatView() {
            const messagesHtml = state.chat.messages.map(msg => `
                <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}">
                    ${msg.role === 'model' ? '<div class="w-8 h-8 bg-purple-200 rounded-full flex items-center justify-center mr-2 mt-1 shrink-0 text-purple-700 text-xs font-bold shadow-sm">大師</div>' : ''}
                    <div class="max-w-[75%] p-3 rounded-2xl text-sm leading-relaxed shadow-sm ${msg.role === 'user' ? 'bg-amber-600 text-white rounded-br-sm' : 'bg-white text-stone-800 border border-purple-100 rounded-bl-sm'}">
                        ${msg.text}
                    </div>
                </div>
            `).join('');

            const loadingHtml = state.chat.isLoading ? `
                <div class="flex justify-start animate-in fade-in">
                    <div class="w-8 h-8 bg-purple-200 rounded-full flex items-center justify-center mr-2 mt-1 shrink-0 text-purple-700 text-xs font-bold shadow-sm">大師</div>
                    <div class="bg-white p-3 rounded-2xl rounded-bl-sm border border-purple-100 shadow-sm text-purple-500 flex items-center gap-2 text-sm font-bold">
                        <i data-lucide="loader-2" class="animate-spin" style="width: 16px; height: 16px;"></i> 大師思考中...
                    </div>
                </div>
            ` : '';

            return `
                <div class="w-full h-full flex flex-col bg-stone-50 relative">
                    <div class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white p-3 flex gap-3 items-center shrink-0 shadow-sm z-10">
                        <div class="bg-white/20 p-2 rounded-full">
                            <i data-lucide="sparkles" style="width: 20px; height: 20px;"></i>
                        </div>
                        <div>
                            <h2 class="text-sm font-black tracking-wide">八音大師解惑專區</h2>
                            <p class="text-[10px] text-purple-100">隨時問我關於八音的問題！</p>
                        </div>
                    </div>

                    <div id="chat-history-box" class="flex-1 p-4 overflow-y-auto space-y-4 bg-purple-50/40 scroll-smooth">
                        ${messagesHtml}
                        ${loadingHtml}
                    </div>

                    <div class="p-3 bg-white border-t border-stone-200 shrink-0 sticky bottom-0">
                        <div class="flex items-center gap-2 bg-stone-100 border border-stone-200 p-1.5 rounded-full focus-within:border-purple-400 focus-within:ring-2 focus-within:ring-purple-100 transition-all">
                            <input
                                id="chat-input"
                                type="text"
                                oninput="handleChatInput(this.value)"
                                onkeydown="checkChatEnter(event)"
                                placeholder="輸入您的問題..."
                                class="flex-1 bg-transparent px-3 py-1.5 text-sm outline-none text-stone-700 placeholder:text-stone-400"
                                ${state.chat.isLoading ? 'disabled' : ''}
                            />
                            <button onclick="handleChatSend()" ${(!state.chat.inputValue.trim() || state.chat.isLoading) ? 'disabled' : ''} class="bg-purple-600 text-white p-2 rounded-full hover:bg-purple-700 disabled:opacity-50 transition-colors flex items-center justify-center shadow-sm active:scale-95">
                                <i data-lucide="send" style="width: 16px; height: 16px;"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // 6. 初始化執行
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
        });
    </script>
</body>
</html>
